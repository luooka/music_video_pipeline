<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频合成生产监控大盘 - Music Video Pipeline</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #08080c;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.07);
            --accent: #00f2fe;
            --accent-gradient: linear-gradient(135deg, #00f2fe 0%, #4facfe 50%, #9b51e0 100%);
            --text-main: #f5f5f7;
            --text-dim: #8e8e9f;
            --success: hsl(142, 70%, 45%);
            --error: hsl(350, 80%, 60%);
            --info: hsl(195, 90%, 55%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, -apple-system, sans-serif !important;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: grid;
            grid-template-columns: 300px 1fr;
            overflow: hidden;
        }

        /* Frosted custom scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Sidebar Styling */
        aside {
            background: rgba(18, 18, 24, 0.8);
            border-right: 1px solid var(--glass-border);
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            height: 100vh;
            overflow: hidden;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1.5px;
            margin-bottom: 12px;
        }

        .config-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(20px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
        }

        /* Main Content Styling */
        main {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .top-bar a {
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1) !important;
        }
        .top-bar a:hover {
            color: var(--accent) !important;
            background: rgba(0, 242, 254, 0.08) !important;
            box-shadow: 0 4px 12px rgba(0, 242, 254, 0.1);
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 40px;
        }

        /* Buttons Styling */
        button {
            cursor: pointer;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .btn-outline:hover {
            background: rgba(0, 242, 254, 0.1);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.15);
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: #000;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.3);
        }

        /* Task card queue list */
        .task-card {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .task-card:hover {
            border-color: rgba(0, 242, 254, 0.4);
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.04);
        }
        .task-card.selected {
            border-color: var(--accent);
            background: rgba(0, 242, 254, 0.05);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.12);
        }

        /* Status breathing badges */
        .status-badge {
            font-size: 11px;
            font-weight: 800;
            padding: 3px 10px;
            border-radius: 20px;
            text-transform: uppercase;
        }
        .status-waiting {
            background: rgba(241, 196, 15, 0.12);
            color: #f1c40f;
            border: 1px solid rgba(241, 196, 15, 0.25);
        }
        .status-running {
            background: rgba(0, 242, 254, 0.12);
            color: var(--accent);
            border: 1px solid rgba(0, 242, 254, 0.25);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.1);
        }
        .status-completed {
            background: rgba(46, 204, 113, 0.12);
            color: var(--success);
            border: 1px solid rgba(46, 204, 113, 0.25);
        }
        .status-failed {
            background: rgba(255, 71, 87, 0.12);
            color: var(--error);
            border: 1px solid rgba(255, 71, 87, 0.25);
        }
        .status-cancelled {
            background: rgba(142, 142, 159, 0.12);
            color: var(--text-dim);
            border: 1px solid rgba(142, 142, 159, 0.25);
        }

        /* Folding Technical Console Wrapper */
        #console {
            background: #050508;
            border: 1px solid var(--glass-border);
            color: #0f0;
            font-family: monospace;
            font-size: 13px;
            padding: 20px;
            border-radius: 12px;
            height: 300px;
            overflow-y: auto;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
            line-height: 1.6;
        }

        .status-idle {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            text-align: center;
            color: var(--text-dim);
            gap: 15px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
        }

        /* Modal styling */
        .completion-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .completion-modal-content {
            background: var(--bg-color);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,242,254,0.15);
        }
        .completion-modal-content h3 {
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--accent);
        }
        .completion-modal-content p {
            color: var(--text-dim);
            margin-bottom: 15px;
            line-height: 1.6;
        }
        .completion-modal-content .video-link {
            color: var(--accent);
            word-break: break-all;
            font-size: 14px;
            margin: 10px 0;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            border: 1px solid var(--glass-border);
        }
    </style>
</head>
<body>
    <aside>
        <div class="logo">网易云每日推荐</div>
        <div>
            <div class="section-title">网易云账号</div>
            <div class="config-card">
                <div id="netease-login-status" style="margin-bottom:15px; font-size:14px;">
                    <span style="color:#ff4757;">未登录</span>
                </div>
                <button class="btn-outline" id="netease-login-btn" onclick="goToIndexAndLogin()" style="width:100%;">登录状态更新</button>
            </div>
        </div>
        <div>
            <div class="section-title">状态说明</div>
            <div class="config-card" style="font-size:13px; color:var(--text-dim); line-height:1.6;">
                这是实时监控页。您可以在这里以垂直排队形式查看各合成任务状态、内联控制以及实时的底层 FFmpeg 压制日志。
            </div>
        </div>
    </aside>

    <main>
        <div class="top-bar">
            <div style="display:flex; align-items:center; gap:30px; flex:1;">
                <h2>流水线监控</h2>
                <div style="display:flex; gap:15px; align-items:center;">
                    <a href="/" style="color:var(--text-dim); text-decoration:none; font-size:14px; padding:8px 12px; border-radius:6px; transition: all 0.3s;">合成页</a>
                    <a href="/static/logs.html" style="color:var(--accent); text-decoration:none; font-size:14px; padding:8px 12px; border-radius:6px; background:rgba(0, 242, 254, 0.1); box-shadow: 0 0 10px rgba(0, 242, 254, 0.2); transition: all 0.3s;">监控页</a>
                    <a href="/static/upload.html" style="color:var(--text-dim); text-decoration:none; font-size:14px; padding:8px 12px; border-radius:6px; transition: all 0.3s;">投稿页</a>
                </div>
            </div>
        </div>

        <div class="tab-content">
            <!-- 垂直一列一列展示的任务列表容器 -->
            <div id="logs-task-container">
                <div class="status-idle">
                    <div style="font-size: 40px;">🛌</div>
                    <h3 style="font-size: 20px; font-weight: 700; color: var(--text-main);">当前没有正在运行的制作任务</h3>
                    <p style="font-size: 14px; max-width: 400px; line-height: 1.6;">流水线当前处于空闲状态。请前往<a href="/" style="color: var(--accent); text-decoration: none; font-weight: 600;">【合成页】</a>挑选歌曲并一键开始生成您的专属律动歌词视频。</p>
                </div>
            </div>

            <!-- 底层技术终端日志，与选中任务联动 -->
            <div id="console-card" class="config-card" style="display: none; flex-direction: column; gap: 15px; flex: 1; min-height: 350px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h4 style="font-size: 14px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px;">实时流水线底层日志</h4>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-outline" onclick="copyConsoleLogs()" style="font-size: 11px; padding: 6px 14px; border-radius: 20px;">复制日志</button>
                        <button class="btn-outline" onclick="clearConsoleLogs()" style="font-size: 11px; padding: 6px 14px; border-radius: 20px; border-color: rgba(255, 71, 87, 0.2); color: var(--error);">清空终端</button>
                    </div>
                </div>
                <div id="console" style="flex: 1; min-height: 250px; max-height: 450px;"></div>
            </div>
        </div>
    </main>

    <!-- Completion Modal -->
    <div id="completion-modal" class="completion-modal" style="display:none;">
        <div class="completion-modal-content">
            <h3>🎉 视频合成大功告成！</h3>
            <div id="modal-content">
                <p>视频已成功通过流水线渲染，并在本地落盘。</p>
                <div id="video-path" class="video-link"></div>
                <p id="upload-info" style="font-size: 13px;"></p>
            </div>
            <div style="display:flex; gap:15px; margin-top:25px; justify-content: center; width: 100%;">
                <button class="btn-outline" onclick="closeModal()" style="flex: 1; min-width: 90px;">关闭</button>
                <button class="btn-primary" onclick="copyVideoPath()" style="flex: 1; min-width: 90px; width: auto;">复制路径</button>
                <button id="open-upload-btn" class="btn-outline" style="display:none; flex: 1; min-width: 90px;" onclick="openUploadPage()">去投稿</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let pollInterval = null;
        let selectedTaskId = null;
        let completedTaskIds = new Set();
        try {
            const savedShown = sessionStorage.getItem('music_pipeline_shown_completed_tasks');
            if (savedShown) {
                completedTaskIds = new Set(JSON.parse(savedShown));
            }
        } catch (e) {}

        async function checkStatus() {
            try {
                const res = await fetch(`${API_BASE}/status`);
                if (!res.ok) return;
                const data = await res.json();

                const container = document.getElementById('logs-task-container');
                const consoleCard = document.getElementById('console-card');

                if (!data.tasks || data.tasks.length === 0) {
                    container.innerHTML = `
                        <div class="status-idle">
                            <div style="font-size: 40px;">🛌</div>
                            <h3 style="font-size: 20px; font-weight: 700; color: var(--text-main);">当前没有正在运行的制作任务</h3>
                            <p style="font-size: 14px; max-width: 400px; line-height: 1.6;">流水线当前处于空闲状态。请前往<a href="/" style="color: var(--accent); text-decoration: none; font-weight: 600;">【合成页】</a>挑选歌曲并一键开始生成您的专属律动歌词视频。</p>
                        </div>
                    `;
                    consoleCard.style.display = 'none';
                    selectedTaskId = null;
                    return;
                }

                // 1. 若没有选中的任务，或者原选中任务已被从服务器彻底清空，则默认选择当前状态最好或首个任务
                if (!selectedTaskId || !data.tasks.some(t => t.id === selectedTaskId)) {
                    const runningTask = data.tasks.find(t => t.status === 'running') || data.tasks[0];
                    selectedTaskId = runningTask ? runningTask.id : null;
                }

                // 2. 垂直渲染任务卡片列表
                renderTaskCards(data.tasks);

                // 3. 渲染选中任务日志终端
                const task = data.tasks.find(t => t.id === selectedTaskId);
                if (task) {
                    consoleCard.style.display = 'flex';

                    // 更新实时日志输出
                    const consoleDiv = document.getElementById('console');
                    if (task.logs && task.logs.length > 0) {
                        consoleDiv.innerHTML = task.logs.map(l => `<div>&gt; ${l}</div>`).join('');
                    } else {
                        consoleDiv.innerHTML = `<div>&gt; 等待任务启动以输出底层压制日志...</div>`;
                    }
                    consoleDiv.scrollTop = consoleDiv.scrollHeight;

                    // 完结状态自动弹出模态框 (仅一次)
                    if (task.status === 'completed' && !completedTaskIds.has(task.id)) {
                        completedTaskIds.add(task.id);
                        try {
                            sessionStorage.setItem('music_pipeline_shown_completed_tasks', JSON.stringify(Array.from(completedTaskIds)));
                        } catch (e) {}
                        showCompletionModalForTask(task);
                    }
                } else {
                    consoleCard.style.display = 'none';
                }
            } catch (e) {
                console.error("轮询状态失败", e);
            }
        }

        function renderTaskCards(tasks) {
            const container = document.getElementById('logs-task-container');
            if (!container) return;

            container.innerHTML = tasks.map(task => {
                const isSelected = task.id === selectedTaskId;
                const cardClass = `task-card ${isSelected ? 'selected' : ''}`;
                
                let badgeClass = "status-badge";
                let statusText = "等待中";
                
                if (task.status === "waiting") {
                    badgeClass += " status-waiting";
                    statusText = "排队中";
                } else if (task.status === "running") {
                    badgeClass += " status-running";
                    statusText = "合成中";
                } else if (task.status === "completed") {
                    badgeClass += " status-completed";
                    statusText = "已完成";
                } else if (task.status === "cancelled") {
                    badgeClass += " status-cancelled";
                    statusText = "已取消";
                } else if (task.status === "failed") {
                    badgeClass += " status-failed";
                    statusText = "失败";
                }
                
                let actionBtn = "";
                if (task.status === "waiting" || task.status === "running") {
                    actionBtn = `<button onclick="event.stopPropagation(); cancelTask('${task.id}')" style="background: rgba(255,71,87,0.1); border: 1px solid rgba(255,71,87,0.3); color: var(--error); padding: 4px 12px; font-size: 12px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: all 0.2s;">取消</button>`;
                } else {
                    actionBtn = `<button onclick="event.stopPropagation(); deleteTask('${task.id}')" style="background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); color: var(--text-dim); padding: 4px 12px; font-size: 12px; border-radius: 20px; cursor: pointer; transition: all 0.2s;">删除</button>`;
                }
                
                const progressPct = task.progress || 0;
                const showProgress = (task.status === "running" || task.status === "waiting" || task.status === "completed");
                
                return `
                    <div onclick="selectTask('${task.id}')" class="${cardClass}" style="margin-bottom: 12px;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div style="display: flex; flex-direction: column; gap: 4px; overflow: hidden; flex: 1; padding-right: 15px;">
                                <div style="font-size: 15px; font-weight: 800; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                                    任务 #${task.id} (${task.songs_count}首歌曲)
                                </div>
                                <div style="font-size: 12px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${task.songs_names.join('、')}">
                                    曲目清单: ${task.songs_names.join('、')}
                                </div>
                            </div>
                            <div style="display: flex; align-items: center; gap: 12px; flex-shrink: 0;">
                                <span class="${badgeClass}">
                                    ${statusText}
                                </span>
                                ${actionBtn}
                            </div>
                        </div>
                        
                        <div style="font-size: 13px; color: var(--text-main); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                            📢 状态: ${task.current_status_text}
                        </div>
                        
                        ${showProgress ? `
                        <div style="display: flex; align-items: center; gap: 12px; margin-top: 2px;">
                            <div style="flex: 1; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden;">
                                <div style="width: ${progressPct}%; height: 100%; background: var(--accent-gradient); transition: width 0.3s;"></div>
                            </div>
                            <span style="font-size: 13px; font-weight: 800; color: var(--accent); min-width: 36px; text-align: right;">${progressPct}%</span>
                        </div>
                        ` : ''}
                        
                        <div style="font-size: 11px; color: var(--text-dim); text-align: right; margin-top: -4px;">
                            创建于: ${task.created_at}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function selectTask(id) {
            selectedTaskId = id;
            checkStatus();
        }

        async function cancelTask(id) {
            if (!confirm("确定要取消此合成任务吗？")) return;
            try {
                const res = await fetch(`${API_BASE}/tasks/${id}/cancel`, { method: 'POST' });
                if (res.ok) {
                    checkStatus();
                } else {
                    alert("取消失败，请重试");
                }
            } catch(e) {
                alert("连接服务失败");
            }
        }

        async function deleteTask(id) {
            if (!confirm("确定要删除此任务记录吗？")) return;
            try {
                const res = await fetch(`${API_BASE}/tasks/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    if (selectedTaskId === id) selectedTaskId = null;
                    checkStatus();
                } else {
                    alert("删除失败，请重试");
                }
            } catch(e) {
                alert("连接服务失败");
            }
        }

        function showCompletionModalForTask(task) {
            document.getElementById('video-path').innerText = task.final_video_path || '未找到视频路径';
            
            const hasUpload = task.logs && task.logs.some(l => l.includes('Upload success'));
            const uploadFailed = task.logs && task.logs.some(l => l.includes('Upload failed') || l.includes('Auto-upload error'));
            
            if (task.auto_upload) {
                if (hasUpload) {
                    document.getElementById('upload-info').innerHTML = 
                        '<span style="color:#2ecc71;">已自动上传到B站！</span>';
                } else if (uploadFailed) {
                    document.getElementById('upload-info').innerHTML = 
                        '<span style="color:#ff4757;">自动上传失败，请手动投稿。</span>';
                    document.getElementById('open-upload-btn').style.display = 'inline-block';
                } else {
                    document.getElementById('upload-info').innerText = '自动上传状态未知，请检查日志。';
                }
            } else {
                document.getElementById('upload-info').innerText = '点击"去投稿"手动上传到B站。';
                document.getElementById('open-upload-btn').style.display = 'inline-block';
            }
            
            document.getElementById('completion-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('completion-modal').style.display = 'none';
            checkStatus();
        }

        function copyVideoPath() {
            const path = document.getElementById('video-path').innerText;
            navigator.clipboard.writeText(path);
            alert('视频路径已成功复制到剪贴板！');
        }

        function openUploadPage() {
            const path = document.getElementById('video-path').innerText;
            window.location.href = '/static/upload.html?video_path=' + encodeURIComponent(path);
        }

        function copyConsoleLogs() {
            const logsText = Array.from(document.querySelectorAll('#console div')).map(d => d.textContent).join('\n');
            navigator.clipboard.writeText(logsText);
            alert('日志已成功复制到剪贴板！');
        }

        function clearConsoleLogs() {
            document.getElementById('console').innerHTML = '';
        }

        function goToIndexAndLogin() {
            window.location.href = "/?login=1";
        }

        async function loadInitial() {
            try {
                // 读取网易云 Cookie 配置
                const res = await fetch(`${API_BASE}/config`);
                if (res.ok) {
                    const config = await res.json();
                    const statusDiv = document.getElementById('netease-login-status');
                    const loginBtn = document.getElementById('netease-login-btn');
                    if (config.netease_cookie && config.netease_cookie.trim() !== '') {
                        statusDiv.innerHTML = '<span style="color:#2ecc71;">已登录</span>';
                        loginBtn.textContent = '重新扫码登录';
                        loginBtn.className = 'btn-outline';
                    } else {
                        statusDiv.innerHTML = '<span style="color:#ff4757;">未登录</span>';
                        loginBtn.textContent = '扫码登录网易云';
                        loginBtn.className = 'btn-primary';
                    }
                }
            } catch(e) {}
        }

        loadInitial();
        checkStatus();
        pollInterval = setInterval(checkStatus, 1500);
    </script>
</body>
</html>
