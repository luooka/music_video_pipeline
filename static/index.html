<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Video Pipeline MVP</title>
    <style>
        :root {
            --bg-color: #0d0d12;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00f2fe;
            --accent-gradient: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --text-main: #ffffff;
            --text-dim: #a0a0b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: grid;
            grid-template-columns: 300px 1fr;
            overflow: hidden;
        }

        /* Side Panel */
        aside {
            background: rgba(18, 18, 24, 0.8);
            border-right: 1px solid var(--glass-border);
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            height: 100vh;
            overflow: hidden; /* Force side panel height containment */
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1.5px;
            margin-bottom: 12px;
        }

        .config-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 12px;
        }

        input {
            width: 100%;
            border: none;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            outline: none;
            border: 1px solid transparent;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }

        button {
            cursor: pointer;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: #000;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .btn-outline:hover {
            background: rgba(0, 242, 254, 0.1);
        }

        /* Main Content */
        main {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 30px;
            position: relative;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        #songs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            overflow-y: auto;
            flex: 1;
            padding-bottom: 100px;
        }

        .song-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .song-card:hover {
            border-color: var(--accent);
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.08);
        }

        .song-card.selected {
            border-color: var(--accent);
            background: rgba(0, 242, 254, 0.1);
        }

        .song-card .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--accent);
            color: #000;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            z-index: 10;
        }

        .song-card.selected .badge {
            display: flex;
        }

        .cover-art {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 12px;
            margin-bottom: 12px;
            object-fit: cover;
        }

        .song-info .name {
            font-weight: 700;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-info .artist {
            font-size: 14px;
            color: var(--text-dim);
        }

        /* Bottom Action Bar */
        .action-bar {
            position: absolute;
            bottom: 30px;
            left: 30px;
            right: 30px;
            background: rgba(22, 22, 30, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transform: translateY(150%);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        .action-bar.visible {
            transform: translateY(0);
        }

        /* Console */
        #console {
            background: #000;
            border: 1px solid #333;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            padding: 15px;
            border-radius: 12px;
            height: 150px;
            overflow-y: auto;
            display: none;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        /* Completion modal */
        .completion-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .completion-modal-content {
            background: var(--bg-color);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
        }
        .completion-modal-content h3 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        .completion-modal-content p {
            color: var(--text-dim);
            margin-bottom: 15px;
            line-height: 1.6;
        }
        .completion-modal-content .video-link {
            color: var(--accent);
            word-break: break-all;
            font-size: 14px;
        }
        .login-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .login-modal-content {
            background: var(--bg-color);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
        }
        /* Premium UI Upgrades */
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --bg-color: #08080c;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.07);
            --accent: #00f2fe;
            --accent-gradient: linear-gradient(135deg, #00f2fe 0%, #4facfe 50%, #9b51e0 100%);
            --text-main: #f5f5f7;
            --text-dim: #8e8e9f;
            --success: hsl(142, 70%, 45%);
            --error: hsl(350, 80%, 60%);
            --info: hsl(195, 90%, 55%);
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, -apple-system, sans-serif !important;
        }
        
        * {
            font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, -apple-system, sans-serif !important;
        }

        /* Frosted custom scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Improved cards and hover systems */
        .song-card {
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .song-card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 12px 24px rgba(0, 242, 254, 0.15);
            background: rgba(255, 255, 255, 0.08);
        }
        .song-card.selected {
            border-color: var(--accent);
            background: rgba(0, 242, 254, 0.08);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.1);
        }
        .song-card .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--accent-gradient);
            color: #000;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 13px;
            z-index: 10;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
            opacity: 0;
            transform: scale(0);
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .song-card.selected .badge {
            opacity: 1;
            transform: scale(1);
        }

        /* Scanner Laser line overlay */
        .qr-wrapper {
            position: relative;
            display: inline-block;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }
        .qr-scanner-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, transparent, #00f2fe, #2ecc71, #00f2fe, transparent);
            box-shadow: 0 0 8px #00f2fe, 0 0 15px #2ecc71;
            animation: scanLine 2.5s ease-in-out infinite;
            z-index: 5;
        }
        @keyframes scanLine {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        /* Custom spinner and progress steppers */
        .pulsing-spinner {
            width: 28px;
            height: 28px;
            border: 3px solid rgba(0, 242, 254, 0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: rotateSpinner 1s linear infinite;
        }
        @keyframes rotateSpinner {
            100% { transform: rotate(360deg); }
        }
        .stepper-phases .step-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-dim);
            padding: 5px 10px;
            border-radius: 6px;
            transition: all 0.3s;
        }
        .stepper-phases .step-item.active {
            color: var(--accent);
            background: rgba(0, 242, 254, 0.05);
            font-weight: 600;
        }
        .stepper-phases .step-item.completed {
            color: var(--success);
            background: rgba(46, 204, 113, 0.05);
        }
        .stepper-phases .step-item.failed {
            color: var(--error);
            background: rgba(255, 71, 87, 0.05);
        }
        .stepper-phases .step-item .step-dot {
            font-size: 11px;
        }

        /* Dynamic search expand focus */
        #search-input {
            width: 200px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1) !important;
        }
        #search-input:focus {
            width: 270px !important;
            background: rgba(0,0,0,0.5) !important;
            border-color: var(--accent) !important;
            box-shadow: 0 0 12px rgba(0, 242, 254, 0.2) !important;
        }

        /* Skeleton loadings */
        .skeleton-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            height: 270px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }
        .skeleton-art {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
        }
        .skeleton-text {
            height: 16px;
            border-radius: 4px;
            background: rgba(255,255,255,0.05);
        }
        .skeleton-text.short {
            width: 60%;
        }
        .shimmer-sweep {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transform: translateX(-100%);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }

        /* Horizontal Drag and Drop Queue Styling */
        .queue-item {
            position: relative;
            width: 54px;
            height: 54px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.08);
            cursor: grab;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            flex-shrink: 0;
            user-select: none;
        }
        .queue-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
        }
        .queue-index {
            position: absolute;
            top: -6px;
            left: -6px;
            background: var(--accent-gradient);
            color: #000;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 800;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        .queue-remove-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #ff4757;
            color: #fff;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10;
        }
        .queue-item:hover .queue-remove-btn {
            opacity: 1;
        }
        .queue-item:hover {
            border-color: var(--accent);
            transform: scale(1.08);
            box-shadow: 0 4px 12px rgba(0, 242, 254, 0.25);
        }
        .queue-item.dragging {
            opacity: 0.3;
            border: 1px dashed var(--accent);
        }

        /* 任务队列高级样式 */
        .sidebar-task-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            font-size: 12px;
            transition: all 0.3s;
            margin-bottom: 8px;
        }
        .sidebar-task-item:hover {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.04);
        }
        .sidebar-task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .task-id {
            font-weight: 700;
            color: var(--text-main);
        }
        .task-status-badge {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
        }
        .status-waiting {
            background: rgba(241, 196, 15, 0.15) !important;
            color: #f1c40f !important;
            border: 1px solid rgba(241, 196, 15, 0.3) !important;
        }
        .status-running {
            background: rgba(0, 242, 254, 0.15) !important;
            color: var(--accent) !important;
            border: 1px solid rgba(0, 242, 254, 0.3) !important;
        }
        .status-completed {
            background: rgba(46, 204, 113, 0.15) !important;
            color: var(--success) !important;
            border: 1px solid rgba(46, 204, 113, 0.3) !important;
        }
        .status-failed {
            background: rgba(231, 76, 60, 0.15) !important;
            color: var(--error) !important;
            border: 1px solid rgba(231, 76, 60, 0.3) !important;
        }
        .status-cancelled {
            background: rgba(142, 142, 159, 0.15) !important;
            color: var(--text-dim) !important;
            border: 1px solid rgba(142, 142, 159, 0.3) !important;
        }
        .task-progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 2px;
        }
        .task-progress-bar {
            height: 100%;
            background: var(--accent-gradient);
            transition: width 0.4s;
        }
        .task-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2px;
        }
        .task-action-btn {
            cursor: pointer;
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .task-action-btn:hover {
            background: rgba(255, 71, 87, 0.15);
            color: #ff4757;
        }

        .status-success { background:rgba(46,204,113,0.1) !important; border:1px solid var(--success) !important; color:var(--success) !important; padding:12px; border-radius:8px; margin:10px 0; font-size:14px; }
        .status-error { background:rgba(255,71,87,0.1) !important; border:1px solid var(--error) !important; color:var(--error) !important; padding:12px; border-radius:8px; margin:10px 0; font-size:14px; }
        .status-info { background:rgba(0,242,254,0.1) !important; border:1px solid var(--info) !important; color:var(--info) !important; padding:12px; border-radius:8px; margin:10px 0; font-size:14px; }
        .top-bar a {
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1) !important;
        }
        .top-bar a:hover {
            color: var(--accent) !important;
            background: rgba(0, 242, 254, 0.08) !important;
            box-shadow: 0 4px 12px rgba(0, 242, 254, 0.1);
        }

        /* Playlist Sidebar Items */
        .playlist-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            user-select: none;
        }
        .playlist-item:hover {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(3px);
        }
        .playlist-item.active {
            border-color: var(--accent);
            background: rgba(0, 242, 254, 0.08);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.15);
        }
        .playlist-item img {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            object-fit: cover;
        }
        .playlist-item .info {
            flex: 1;
            overflow: hidden;
        }
        .playlist-item .info .name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .playlist-item .info .count {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 2px;
        }
        .playlist-item.daily {
            background: linear-gradient(135deg, rgba(0, 242, 254, 0.08) 0%, rgba(155, 81, 224, 0.08) 100%);
            border-color: rgba(0, 242, 254, 0.2);
        }
        .playlist-item.daily:hover {
            border-color: var(--accent);
            background: linear-gradient(135deg, rgba(0, 242, 254, 0.12) 0%, rgba(155, 81, 224, 0.12) 100%);
        }

        /* Explorer-style Song List Table Layout */
        .songs-list-header {
            display: grid;
            grid-template-columns: 50px 48px 2.5fr 1.5fr 80px;
            gap: 15px;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 600;
            user-select: none;
            margin-bottom: 6px;
        }
        .songs-list-view {
            display: flex;
            flex-direction: column;
            gap: 4px; /* Compact gap */
            overflow-y: auto;
            flex: 1;
            padding-bottom: 100px;
        }
        .song-row {
            display: grid;
            grid-template-columns: 50px 48px 2.5fr 1.5fr 80px;
            gap: 15px;
            align-items: center;
            background: transparent; /* Seamless list style */
            border-bottom: 1px solid rgba(255, 255, 255, 0.03); /* Subtle separator */
            border-radius: 6px;
            padding: 8px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }
        .song-row:hover {
            background: rgba(255, 255, 255, 0.05); /* Explorer style row hover */
        }
        .song-row.selected {
            background: rgba(0, 242, 254, 0.08); /* Explorer style row select */
            border-bottom-color: rgba(0, 242, 254, 0.15);
        }
        .song-row .row-index-container {
            position: relative;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .song-row .row-index-num {
            font-size: 13px;
            color: var(--text-dim);
            transition: all 0.2s;
        }
        .song-row.selected .row-index-num {
            display: none;
        }
        .song-row .row-badge {
            position: absolute;
            background: var(--accent-gradient);
            color: #000;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 11px;
            box-shadow: 0 0 8px rgba(0, 242, 254, 0.4);
            opacity: 0;
            transform: scale(0);
            transition: all 0.2s ease;
        }
        .song-row.selected .row-badge {
            opacity: 1;
            transform: scale(1);
        }
        .song-row img {
            width: 32px; /* Compact Explorer-style cover size */
            height: 32px;
            border-radius: 4px;
            object-fit: cover;
        }
        .song-row .row-title-container {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-right: 10px;
        }
        .song-row .row-title {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .song-row .row-artists {
            font-size: 12px;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }
        .song-row .row-album {
            font-size: 13px;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 10px;
        }
        .song-row .row-duration {
            font-size: 13px;
            color: var(--text-dim);
            text-align: right;
            padding-right: 10px;
        }
    </style>
</head>

<body>
    <aside>
        <div class="logo">网易云每日推荐</div>

        <div>
            <div class="section-title">网易云账号</div>
            <div class="config-card">
                <div id="netease-login-status" style="margin-bottom:15px; font-size:14px;">
                    <span style="color:#ff4757;">未登录</span>
                </div>
                <button class="btn-primary" id="netease-login-btn" onclick="startNeteaseLogin()" style="width:100%;">扫码登录网易云</button>
            </div>
        </div>

        <div>
            <div class="section-title">合成任务队列</div>
            <div class="config-card" id="task-queue-card" style="padding: 12px; display: flex; flex-direction: column; gap: 10px; max-height: 250px; overflow-y: auto; background: rgba(0, 0, 0, 0.2);">
                <div style="text-align: center; color: var(--text-dim); font-size: 13px; padding: 10px 0;">
                    暂无合成任务
                </div>
            </div>
            <div id="status-display" style="color: var(--text-dim); font-size: 12px; margin-top: 8px; padding-left: 4px;">准备就绪</div>
        </div>

        <div>
            <div class="section-title">上传格式</div>
            <div id="format-selector" style="margin-bottom:15px;">
                <select id="upload-format" style="width:100%; margin-bottom:10px; background:rgba(0,0,0,0.3); color:#fff; border:1px solid var(--glass-border); padding:8px; border-radius:6px;">
                    <option value="default">默认格式</option>
                </select>
                <label style="display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-dim); cursor:pointer;">
                    <input type="checkbox" id="auto-upload" style="width:16px; height:16px;">
                    合成后自动上传
                </label>
            </div>
        </div>

        <div id="playlists-card" style="flex: 1; display: flex; flex-direction: column; overflow: hidden; margin-top: 10px;">
            <div class="section-title">网易云歌单库</div>
            <div id="playlists-container" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 4px;">
                <div style="text-align: center; padding: 20px; color: var(--text-dim); font-size: 13px;">
                    登录网易云后自动同步歌单
                </div>
            </div>
        </div>

        <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--glass-border);">
            <div class="section-title">开发者工具</div>
            <a href="/docs" target="_blank" style="color: var(--accent); font-size: 13px; text-decoration: none; display: flex; align-items: center; gap: 5px;">
                <span>📂 查看交互式 API 文档</span>
                <span style="font-size: 10px;">↗</span>
            </a>
        </div>
    </aside>

    <main>
        <div class="top-bar">
            <div style="display:flex; align-items:center; gap:30px; flex:1;">
                <h2 id="page-subtitle">今日推荐</h2>
                <div style="display:flex; gap:15px; align-items:center;">
                    <a href="/" style="color:var(--accent); text-decoration:none; font-size:14px; padding:8px 12px; border-radius:6px; background:rgba(0, 242, 254, 0.15); box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);">合成页</a>
                    <a href="/static/logs.html" style="color:var(--text-dim); text-decoration:none; font-size:14px; padding:8px 12px; border-radius:6px;">监控页</a>
                    <a href="/static/upload.html" style="color:var(--text-dim); text-decoration:none; font-size:14px; padding:8px 12px; border-radius:6px;">投稿页</a>
                </div>
                
                <!-- Frosted custom Search Container -->
                <div style="display:flex; align-items:center; gap:10px; position:relative; margin-left: 20px;" id="search-container">
                    <span style="position:absolute; left:12px; color:var(--text-dim); font-size:13px; pointer-events:none; z-index:2;">🔍</span>
                    <input type="text" id="search-input" onkeydown="handleSearchKey(event)" placeholder="搜索网易云曲库..." style="margin-bottom:0; padding:8px 16px 8px 34px; font-size:13px; border-radius:20px; background:rgba(255,255,255,0.03); border:1px solid var(--glass-border); outline:none;">
                    <button id="search-btn" onclick="executeSearch()" class="btn-outline" style="padding:6px 14px; font-size:12px; border-radius:20px; display:none; cursor:pointer;">检索</button>
                    <button id="clear-search-btn" onclick="clearSearch()" class="btn-outline" style="padding:6px 14px; font-size:12px; border-radius:20px; display:none; border-color:var(--error); color:var(--error); cursor:pointer;">返回推荐</button>
                </div>
            </div>
            <div class="btn-group" style="align-items: center; gap: 8px;">
                <button class="btn-outline" onclick="forceRefreshSongs()" style="font-size: 13px; border-radius: 20px;">刷新列表</button>
                <button class="btn-outline" onclick="selectAll()" style="font-size: 13px; border-radius: 20px;">全选</button>
                <button class="btn-outline" onclick="deselectAll()" style="font-size: 13px; border-radius: 20px;">清空</button>
            </div>
        </div>

        <div id="songs-grid">
            <!-- 歌曲卡片将在这里渲染 -->
        </div>

        <!-- 搜索分页控制栏 -->
        <div id="pagination-controls" style="display: none; justify-content: center; align-items: center; gap: 15px; margin: 20px 0 90px 0; padding: 10px; z-index: 10;">
            <button class="btn-outline" id="prev-page-btn" onclick="changePage(-1)" style="padding: 8px 16px; font-size: 13px; border-radius: 20px; cursor: pointer; transition: all 0.3s;">上一页</button>
            <span style="font-size: 14px; color: var(--text-main); font-weight: 500;">
                第 <span id="current-page-num" style="color: var(--accent); font-weight: 700;">1</span> / <span id="total-page-num" style="color: var(--text-dim);">1</span> 页
            </span>
            <button class="btn-outline" id="next-page-btn" onclick="changePage(1)" style="padding: 8px 16px; font-size: 13px; border-radius: 20px; cursor: pointer; transition: all 0.3s;">下一页</button>
        </div>

        <div class="action-bar" id="action-bar" style="display:flex; flex-direction:column; gap:12px; align-items:stretch; padding:15px 30px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="font-size:13px; font-weight:600;">
                     已选择 <span id="select-count" style="color: var(--accent); font-weight: 800;">0</span> 首歌曲
                    <span style="color:var(--text-dim); font-size:11px; font-weight:normal; margin-left:10px;">(可拖拽封面调整播放顺序，或点 × 移除)</span>
                </div>
                <button class="btn-primary" style="width: auto; padding: 10px 30px; font-size:13px;" onclick="startGenerate()">立即合成视频</button>
            </div>
            <div id="selection-queue" style="display:flex; gap:12px; overflow-x:auto; padding:5px 2px; min-height:68px;">
                <!-- 选中曲目队列将在这里动态渲染 -->
            </div>
        </div>
    </main>

    <script>
        let allSongs = [];
        let selectedSongs = []; // 全局选中的歌曲对象数组，支持持久化跨搜索与推荐，并且维持重排顺序
        const API_BASE = window.location.origin;

        // 统一分页与状态管理器
        let currentPage = 0;
        let totalCount = 0;
        const pageSize = 20;
        let paginationMode = "recommend"; // "search" | "playlist" | "recommend"
        let currentSearchQuery = "";
        let searchCache = {}; // 搜索页内存缓存

        // 从 sessionStorage 恢复已选择歌曲队列（实现“关闭页面/浏览器后自动清除缓存，但切换页面或刷新时保留”）
        try {
            const saved = sessionStorage.getItem('music_pipeline_selected_songs');
            if (saved) {
                selectedSongs = JSON.parse(saved);
            }
        } catch (e) {
            console.error("加载缓存选择失败", e);
        }
        updateActionBar();

        function saveSessionCache() {
            try {
                sessionStorage.setItem('music_pipeline_all_songs', JSON.stringify(allSongs));
                sessionStorage.setItem('music_pipeline_active_playlist_id', activePlaylistId);
                sessionStorage.setItem('music_pipeline_pagination_mode', paginationMode);
                sessionStorage.setItem('music_pipeline_current_page', currentPage);
                sessionStorage.setItem('music_pipeline_total_count', totalCount);
                sessionStorage.setItem('music_pipeline_search_query', currentSearchQuery);
            } catch (e) {
                console.error("保存缓存失败", e);
            }
        }

        function forceRefreshSongs() {
            sessionStorage.removeItem('music_pipeline_all_songs');
            sessionStorage.removeItem('music_pipeline_active_playlist_id');
            sessionStorage.removeItem('music_pipeline_pagination_mode');
            sessionStorage.removeItem('music_pipeline_current_page');
            sessionStorage.removeItem('music_pipeline_total_count');
            sessionStorage.removeItem('music_pipeline_search_query');
            
            searchCache = {}; // 清空检索缓存
            
            if (paginationMode === 'search') {
                executeSearch(true);
            } else if (paginationMode === 'playlist') {
                selectPlaylist(activePlaylistId, true);
            } else {
                fetchSongs();
            }
        }

        // 歌单高级管理状态
        let allPlaylists = [];
        let activePlaylistId = 'daily_recommend';

        // 歌单加载与渲染逻辑
        async function fetchPlaylists() {
            const container = document.getElementById('playlists-container');
            if (!container) return;
            try {
                const res = await fetch(`${API_BASE}/netease/playlists`);
                if (!res.ok) throw new Error();
                const data = await res.json();
                allPlaylists = data.playlists || [];
                renderPlaylists();
            } catch (e) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 20px; color: var(--text-dim); font-size: 13px;">
                        同步歌单失败，请重新登录
                    </div>
                `;
            }
        }

        function renderPlaylists() {
            const container = document.getElementById('playlists-container');
            if (!container) return;
            
            let html = `
                <div class="playlist-item daily ${activePlaylistId === 'daily_recommend' ? 'active' : ''}" onclick="selectPlaylist('daily_recommend')">
                    <div style="font-size: 18px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: rgba(0, 242, 254, 0.1); border-radius: 6px;">📅</div>
                    <div class="info">
                        <div class="name">每日推荐歌曲</div>
                        <div class="count">网易云每日新歌推荐</div>
                    </div>
                </div>
            `;
            
            if (allPlaylists.length > 0) {
                html += allPlaylists.map(p => {
                    const isActive = activePlaylistId.toString() === p.id.toString();
                    return `
                        <div class="playlist-item ${isActive ? 'active' : ''}" onclick="selectPlaylist(${p.id})">
                            <img src="${p.cover || 'https://p1.music.126.net/rlLj3MMgn6WZTQgzRZOOrg==/109951164420512035.jpg'}" alt="cover" onerror="this.src='https://p1.music.126.net/rlLj3MMgn6WZTQgzRZOOrg==/109951164420512035.jpg'">
                            <div class="info">
                                <div class="name">${p.name}</div>
                                <div class="count">${p.track_count} 首歌曲</div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
            container.innerHTML = html;
        }

        async function selectPlaylist(id, keepPage = false) {
            activePlaylistId = id;
            renderPlaylists();
            
            renderSkeletonSongs();
            
            // 清空搜索框
            document.getElementById('search-input').value = "";
            document.getElementById('search-btn').style.display = "none";
            document.getElementById('clear-search-btn').style.display = "none";
            
            if (id === 'daily_recommend') {
                paginationMode = "recommend";
                currentPage = 0;
                totalCount = 0;
                if (document.getElementById('pagination-controls')) {
                    document.getElementById('pagination-controls').style.display = 'none';
                }
                document.getElementById('page-subtitle').innerText = "今日推荐";
                document.getElementById('status-display').innerText = "正在获取每日推荐...";
                await fetchSongs();
            } else {
                paginationMode = "playlist";
                if (!keepPage) {
                    currentPage = 0;
                }
                const playlist = allPlaylists.find(p => p.id.toString() === id.toString());
                const name = playlist ? playlist.name : "网易云歌单";
                totalCount = playlist ? playlist.track_count : 0;
                
                document.getElementById('page-subtitle').innerText = `📂 歌单: "${name}"`;
                document.getElementById('status-display').innerText = "正在加载歌单曲目...";
                
                try {
                    const offset = currentPage * pageSize;
                    const res = await fetch(`${API_BASE}/netease/playlist/tracks?id=${id}&limit=${pageSize}&offset=${offset}`);
                    if (!res.ok) throw new Error();
                    const data = await res.json();
                    allSongs = data.songs || [];
                    
                    updateActionBar();
                    renderSongs();
                    document.getElementById('status-display').innerText = `已加载第 ${offset + 1} - ${offset + allSongs.length} 首，共计 ${totalCount} 首`;
                    
                    updatePaginationControls();
                    saveSessionCache();
                } catch (e) {
                    document.getElementById('status-display').innerText = "加载歌单歌曲失败";
                    document.getElementById('songs-grid').innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-dim);">
                            无法读取此歌单曲目或连接超时
                        </div>
                    `;
                    if (document.getElementById('pagination-controls')) {
                        document.getElementById('pagination-controls').style.display = 'none';
                    }
                }
            }
        }



        async function fetchSongs() {
            document.getElementById('status-display').innerText = "加载中...";
            try {
                const res = await fetch(`${API_BASE}/recommendations`);
                if (!res.ok) {
                    const data = await res.json();
                    document.getElementById('status-display').innerText = "加载失败: " + (data.detail || "请先登录或刷新Cookie");
                    return;
                }
                const data = await res.json();
                allSongs = data.songs || [];
                // 今日推荐载入时不自动清空全局选中，以保护用户跨页选择
                updateActionBar();
                renderSongs();
                document.getElementById('status-display').innerText = `已加载 ${allSongs.length} 首推荐`;
                loadUploadFormats();
                saveSessionCache();
            } catch (e) {
                document.getElementById('status-display').innerText = "加载失败，请检查网络或登录状态";
            }
        }

        async function loadUploadFormats() {
            try {
                const res = await fetch(`${API_BASE}/bilibili/upload-formats`);
                const formats = await res.json();
                const select = document.getElementById('upload-format');
                select.innerHTML = formats.map(f => `<option value="${f.name}">${f.name}</option>`).join('');
            } catch(e) {}
        }

        function formatDuration(ms) {
            if (!ms) return '--:--';
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function renderSongs() {
            const grid = document.getElementById('songs-grid');
            if (allSongs.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-dim);">
                        暂无曲目，请确认配置或重新检索
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = allSongs.map(s => {
                const idx = selectedSongs.findIndex(item => item.id === s.id);
                return `
                    <div class="song-card ${idx !== -1 ? 'selected' : ''}" onclick="toggleSong(${s.id})">
                        <div class="badge">${idx + 1}</div>
                        <img class="cover-art" src="${s.album_pic || 'https://p1.music.126.net/rlLj3MMgn6WZTQgzRZOOrg==/109951164420512035.jpg'}" alt="${s.name}" onerror="this.src='https://p1.music.126.net/rlLj3MMgn6WZTQgzRZOOrg==/109951164420512035.jpg'">
                        <div class="song-info">
                            <div class="name" title="${s.name}">${s.name}</div>
                            <div class="artist" title="${s.artists.join(', ')}">${s.artists.join(', ')}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleSong(id) {
            const idx = selectedSongs.findIndex(s => s.id === id);
            if (idx !== -1) {
                selectedSongs.splice(idx, 1);
            } else {
                const song = allSongs.find(s => s.id === id);
                if (song) {
                    selectedSongs.push(song);
                }
            }
            updateActionBar();
            renderSongs();
        }

        function removeSongFromQueue(id) {
            const idx = selectedSongs.findIndex(s => s.id === id);
            if (idx !== -1) {
                selectedSongs.splice(idx, 1);
                updateActionBar();
                renderSongs();
            }
        }

        function selectAll() {
            allSongs.forEach(s => {
                if (!selectedSongs.some(item => item.id === s.id)) {
                    selectedSongs.push(s);
                }
            });
            updateActionBar();
            renderSongs();
        }

        function deselectAll() {
            selectedSongs = [];
            updateActionBar();
            renderSongs();
        }

        /* HTML5 Drag and Drop Handlers */
        let dragSrcId = null;

        function handleDragStart(e) {
            e.currentTarget.classList.add('dragging');
            dragSrcId = e.currentTarget.getAttribute('data-id');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', dragSrcId);
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            return false;
        }

        function handleDrop(e) {
            e.stopPropagation();
            e.preventDefault();
            
            const targetId = e.currentTarget.getAttribute('data-id');
            if (dragSrcId !== targetId) {
                const srcIndex = selectedSongs.findIndex(s => s.id.toString() === dragSrcId.toString());
                const targetIndex = selectedSongs.findIndex(s => s.id.toString() === targetId.toString());
                
                if (srcIndex !== -1 && targetIndex !== -1) {
                    const temp = selectedSongs[srcIndex];
                    selectedSongs.splice(srcIndex, 1);
                    selectedSongs.splice(targetIndex, 0, temp);
                    
                    updateActionBar();
                    renderSongs();
                }
            }
            return false;
        }

        function handleDragEnd(e) {
            e.currentTarget.classList.remove('dragging');
            document.querySelectorAll('.queue-item').forEach(item => {
                item.classList.remove('dragging');
            });
        }

        function updateActionBar() {
            const bar = document.getElementById('action-bar');
            const count = document.getElementById('select-count');
            const queueDiv = document.getElementById('selection-queue');
            
            count.innerText = selectedSongs.length;
            
            if (selectedSongs.length > 0) {
                bar.classList.add('visible');
                
                queueDiv.innerHTML = selectedSongs.map((song, index) => `
                    <div class="queue-item" draggable="true" data-id="${song.id}" 
                         ondragstart="handleDragStart(event)" ondragover="handleDragOver(event)" 
                         ondrop="handleDrop(event)" ondragend="handleDragEnd(event)">
                         <img src="${song.album_pic}" alt="cover">
                        <div class="queue-index">${index + 1}</div>
                        <div onclick="event.stopPropagation(); removeSongFromQueue(${song.id})" class="queue-remove-btn">×</div>
                    </div>
                `).join('');
            } else {
                bar.classList.remove('visible');
                queueDiv.innerHTML = '';
            }

            // 同步保存到 sessionStorage，关闭网页自动清除，刷新或跳转保留
            try {
                sessionStorage.setItem('music_pipeline_selected_songs', JSON.stringify(selectedSongs));
            } catch (e) {
                console.error("同步保存选择失败", e);
            }
        }

        // Toast 消息提示器
        function showToast(message, type = "success") {
            const toast = document.createElement('div');
            toast.style.position = 'fixed';
            toast.style.bottom = '110px';
            toast.style.right = '40px';
            toast.style.zIndex = '9999';
            toast.style.padding = '12px 24px';
            toast.style.borderRadius = '12px';
            toast.style.fontSize = '13px';
            toast.style.fontWeight = '600';
            toast.style.boxShadow = '0 8px 30px rgba(0,0,0,0.5)';
            toast.style.backdropFilter = 'blur(15px)';
            toast.style.transition = 'all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            toast.style.transform = 'translateY(50px) scale(0.8)';
            toast.style.opacity = '0';
            
            if (type === "success") {
                toast.style.background = 'rgba(46, 204, 113, 0.15)';
                toast.style.border = '1px solid rgba(46, 204, 113, 0.4)';
                toast.style.color = '#2ecc71';
            } else {
                toast.style.background = 'rgba(255, 71, 87, 0.15)';
                toast.style.border = '1px solid rgba(255, 71, 87, 0.4)';
                toast.style.color = '#ff4757';
            }
            
            toast.innerText = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.transform = 'translateY(0) scale(1)';
                toast.style.opacity = '1';
            }, 50);
            
            setTimeout(() => {
                toast.style.transform = 'translateY(-20px) scale(0.9)';
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        async function startGenerate() {
            if (selectedSongs.length === 0) return;
            const autoUpload = document.getElementById('auto-upload').checked;
            const formatName = autoUpload ? document.getElementById('upload-format').value : '';

            try {
                const res = await fetch(`${API_BASE}/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        songs: selectedSongs, 
                        combine: true, 
                        auto_upload: autoUpload,
                        upload_format_name: formatName 
                    })
                });

                if (res.ok) {
                    showToast("合成任务已成功加入后台排队！");
                    deselectAll();
                    // 立即触发一次状态刷新
                    setTimeout(checkQueueOnce, 500);
                } else {
                    const err = await res.json();
                    showToast("启动合成失败: " + (err.detail || "未知错误"), "error");
                }
            } catch(e) {
                showToast("请求服务失败，请检查网络", "error");
            }
        }

        let pollInterval;
        let completedTaskIds = new Set();
        try {
            const savedShown = sessionStorage.getItem('music_pipeline_shown_completed_tasks');
            if (savedShown) {
                completedTaskIds = new Set(JSON.parse(savedShown));
            }
        } catch (e) {}
        
        function renderTaskQueue(tasks) {
            const container = document.getElementById('task-queue-card');
            if (!container) return;
            
            if (!tasks || tasks.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; color: var(--text-dim); font-size: 13px; padding: 10px 0;">
                        暂无合成任务
                    </div>
                `;
                return;
            }
            
            container.innerHTML = tasks.map(task => {
                let statusColor = "var(--text-dim)";
                let statusBg = "rgba(255,255,255,0.05)";
                let statusText = "排队中";
                
                if (task.status === "waiting") {
                    statusColor = "var(--info)";
                    statusBg = "rgba(0, 242, 254, 0.1)";
                    statusText = "排队中";
                } else if (task.status === "running") {
                    statusColor = "var(--accent)";
                    statusBg = "rgba(0, 242, 254, 0.15)";
                    statusText = "合成中";
                } else if (task.status === "completed") {
                    statusColor = "var(--success)";
                    statusBg = "rgba(46, 204, 113, 0.1)";
                    statusText = "已完成";
                } else if (task.status === "cancelled") {
                    statusColor = "#ff9f43";
                    statusBg = "rgba(255, 159, 67, 0.1)";
                    statusText = "已取消";
                } else if (task.status === "failed") {
                    statusColor = "var(--error)";
                    statusBg = "rgba(255, 71, 87, 0.1)";
                    statusText = "失败";
                }
                
                let actionBtn = "";
                if (task.status === "waiting" || task.status === "running") {
                    actionBtn = `<button onclick="cancelTask('${task.id}')" style="background: rgba(255,71,87,0.1); border: 1px solid rgba(255,71,87,0.3); color: var(--error); padding: 4px 10px; font-size: 11px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: all 0.2s;">取消</button>`;
                } else {
                    actionBtn = `<button onclick="deleteTask('${task.id}')" style="background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); color: var(--text-dim); padding: 4px 10px; font-size: 11px; border-radius: 12px; cursor: pointer; transition: all 0.2s;">删除</button>`;
                }
                
                const progressPct = task.progress || 0;
                const showProgress = (task.status === "running" || task.status === "waiting" || task.status === "completed");
                
                return `
                    <div style="background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 10px; padding: 10px; display: flex; flex-direction: column; gap: 8px; transition: all 0.3s; text-align: left;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-size: 12px; font-weight: 700; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 145px;" title="${task.songs_names.join(', ')}">
                                任务 #${task.id} (${task.songs_count}首)
                            </span>
                            <span style="background: ${statusBg}; color: ${statusColor}; font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 20px;">
                                ${statusText}
                            </span>
                        </div>
                        
                        <div style="font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                            ${task.current_status_text}
                        </div>
                        
                        ${showProgress ? `
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <div style="flex: 1; height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden;">
                                <div style="width: ${progressPct}%; height: 100%; background: var(--accent-gradient); transition: width 0.3s;"></div>
                            </div>
                            <span style="font-size: 10px; font-weight: 800; color: var(--text-dim); min-width: 24px; text-align: right;">${progressPct}%</span>
                        </div>
                        ` : ''}
                        
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 2px; font-size: 10px; color: var(--text-dim);">
                            <span>创建于: ${task.created_at}</span>
                            ${actionBtn}
                        </div>
                    </div>
                `;
            }).join('');
        }

                }

                showToast("连接失败，请检查网络", "error");
            }
        }

        function updateStepperFromLogs(logs) {
            let activeStep = 0; 
            let progressPercent = 0;
            let currentStatusText = "流水线准备中...";
            let hasError = false;

            logs.forEach(log => {
                const text = log.toLowerCase();
                if (text.includes('starting processing') || text.includes('fetch')) {
                    activeStep = 0;
                    progressPercent = 15;
                    currentStatusText = "正在解析并提取歌曲详情...";
                } else if (text.includes('download') || text.includes('processing song') || text.includes('下载')) {
                    activeStep = 1;
                    progressPercent = 35;
                    currentStatusText = "正在从网易云下载高保真音频与歌词...";
                } else if (text.includes('ffmpeg') || text.includes('spectrum') || text.includes('画幅') || text.includes('频谱')) {
                    activeStep = 2;
                    progressPercent = 60;
                    currentStatusText = "正在生成音频动态频谱与视觉粒子...";
                } else if (text.includes('stitch') || text.includes('concat') || text.includes('stitching') || text.includes('拼接') || text.includes('合成')) {
                    activeStep = 3;
                    progressPercent = 80;
                    currentStatusText = "正在拼接长视频片段并合并音频流...";
                } else if (text.includes('upload') || text.includes('bilibili') || text.includes('上传')) {
                    activeStep = 4;
                    progressPercent = 95;
                    currentStatusText = "视频压制完成！正在同步上传至B站账号...";
                }

                if (text.includes('error') || text.includes('failed') || text.includes('错误') || text.includes('失败')) {
                    hasError = true;
                }
            });

            const finalLog = logs.find(l => l.includes('[OK] Done!'));
            if (finalLog) {
                activeStep = 5;
                progressPercent = 100;
                currentStatusText = "视频合成大功告成！";
            }

            // 更新仪表盘 UI
            document.getElementById('stepper-current-task').innerText = currentStatusText;
            document.getElementById('stepper-progress-bar').style.width = progressPercent + '%';
            document.getElementById('stepper-percent').innerText = progressPercent + '%';

            for (let i = 0; i < 5; i++) {
                const el = document.getElementById(`step-${i+1}`);
                if (!el) continue;
                
                if (hasError && i === activeStep) {
                    el.className = "step-item failed";
                    el.querySelector('.step-dot').innerText = "❌";
                } else if (i < activeStep || activeStep === 5) {
                    el.className = "step-item completed";
                    el.querySelector('.step-dot').innerText = "🟢";
                } else if (i === activeStep) {
                    el.className = "step-item active";
                    el.querySelector('.step-dot').innerText = "⚡";
                } else {
                    el.className = "step-item";
                    el.querySelector('.step-dot').innerText = "🔵";
                }
            }
        }

        function handleSearchKey(event) {
            const searchInput = document.getElementById('search-input');
            const searchBtn = document.getElementById('search-btn');
            
            if (searchInput.value.trim() !== "") {
                searchBtn.style.display = "inline-block";

        async function executeSearch(keepPage = false) {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;

            paginationMode = "search";
            if (!keepPage) {
                currentPage = 0;
                searchCache = {}; // 搜索词改变时，清空之前旧搜索的缓存
            }
            currentSearchQuery = query;

            const cacheKey = `${query}_${currentPage}`;
            if (searchCache[cacheKey]) {
                // 缓存击中，直接秒开加载本地缓存
                const cachedData = searchCache[cacheKey];
                allSongs = cachedData.songs || [];
                totalCount = cachedData.total || 0;
                
                updateActionBar();
                renderSongs();
                document.getElementById('status-display').innerText = `已检索到 ${allSongs.length} 首歌曲，共计 ${totalCount} 首 (来自本地缓存)`;
                
                updatePaginationControls();
                saveSessionCache();
                
                // 滚动回顶部
                document.getElementById('songs-grid').scrollTop = 0;
                return;
            }

            renderSkeletonSongs();
            document.getElementById('page-subtitle').innerText = `🔍 搜索结果: "${query}"`;
            document.getElementById('clear-search-btn').style.display = 'inline-block';
            document.getElementById('status-display').innerText = "正在云端检索中...";

            try {
                const offset = currentPage * pageSize;
                const res = await fetch(`${API_BASE}/search?q=${encodeURIComponent(query)}&limit=${pageSize}&offset=${offset}`);
                if (!res.ok) throw new Error("搜索请求失败");
                const data = await res.json();
                
                allSongs = data.songs || [];
                totalCount = data.total || 0;
                
                // 写入本地缓存
                searchCache[cacheKey] = {
                    songs: allSongs,
                    total: totalCount
                };
                
                updateActionBar();
                renderSongs();
                document.getElementById('status-display').innerText = `已检索到 ${allSongs.length} 首歌曲，共计 ${totalCount} 首`;
                
                updatePaginationControls();
                saveSessionCache();
                
                // 滚动回顶部
                document.getElementById('songs-grid').scrollTop = 0;
            } catch (e) {
                document.getElementById('status-display').innerText = "搜索失败，请检查网络";
                document.getElementById('songs-grid').innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-dim);">
                        暂无搜索结果或连接超时
                    </div>
                `;
                document.getElementById('pagination-controls').style.display = 'none';
            }
        }

        function updatePaginationControls() {
            const controls = document.getElementById('pagination-controls');
            if (totalCount > pageSize) {
                controls.style.display = 'flex';
                
                const totalPages = Math.ceil(totalCount / pageSize);
                document.getElementById('current-page-num').innerText = currentPage + 1;
                document.getElementById('total-page-num').innerText = totalPages;
                
                const prevBtn = document.getElementById('prev-page-btn');
                const nextBtn = document.getElementById('next-page-btn');
                
                if (currentPage === 0) {
                    prevBtn.disabled = true;
                    prevBtn.style.opacity = '0.5';
                    prevBtn.style.cursor = 'not-allowed';
                } else {
                    prevBtn.disabled = false;
                    prevBtn.style.opacity = '1';
                    prevBtn.style.cursor = 'pointer';
                }
                
                if (currentPage >= totalPages - 1) {
                    nextBtn.disabled = true;
                    nextBtn.style.opacity = '0.5';
                    nextBtn.style.cursor = 'not-allowed';
                } else {
                    nextBtn.disabled = false;
                    nextBtn.style.opacity = '1';
                    nextBtn.style.cursor = 'pointer';
                }
            } else {
                controls.style.display = 'none';
            }
        }

        function changePage(direction) {
            const totalPages = Math.ceil(totalCount / pageSize);
            const newPage = currentPage + direction;
            if (newPage >= 0 && newPage < totalPages) {
                currentPage = newPage;
                if (paginationMode === 'search') {
                    executeSearch(true);
                } else if (paginationMode === 'playlist') {
                    selectPlaylist(activePlaylistId, true);
                }
            }
        }

        async function pollNeteaseLogin(unikey) {
            if (neteaseLoginPolling) clearInterval(neteaseLoginPolling);
            isNeteaseChecking = false;
            neteaseLoginPolling = setInterval(async () => {
                if (isNeteaseChecking) return;
                isNeteaseChecking = true;
                try {
                    const res = await fetch(`${API_BASE}/netease/check-login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ unikey: unikey })
                    });
                    const data = await res.json();
                    
                    if (data.success && data.status === 'success') {
                        clearInterval(neteaseLoginPolling);
                        document.getElementById('netease-login-msg').innerText = '登录成功，已自动保存配置！';
                        document.getElementById('netease-login-msg').className = 'status-success';
                        
                        updateNeteaseUI(data.music_u);
                        
                        setTimeout(() => {
                            closeNeteaseLoginModal();
                            fetchSongs();
                        }, 1500);
                    } else if (data.status === 'authorizing') {
                        document.getElementById('netease-login-msg').innerText = '已在手机扫码，请在App内点击【确认登录】';
                        document.getElementById('netease-login-msg').className = 'status-info';
                    } else if (data.status === 'expired') {
                        clearInterval(neteaseLoginPolling);
                        document.getElementById('netease-login-msg').innerText = '二维码已失效，请重新生成！';
                        document.getElementById('netease-login-msg').className = 'status-error';
                    }
                } catch (e) {
                } finally {
                    isNeteaseChecking = false;
                }
            }, 2000);
        }

        function closeNeteaseLoginModal() {
            document.getElementById('netease-login-modal').style.display = 'none';
            if (neteaseLoginPolling) clearInterval(neteaseLoginPolling);
        }
    </script>

    <div id="completion-modal" class="completion-modal" style="display:none;">
        <div class="completion-modal-content">
            <h3>合成完成</h3>
            <div id="modal-content">
                <p>视频已成功生成。</p>
                <p id="video-path" class="video-link"></p>
                <p id="upload-info"></p>
            </div>
            <div style="display:flex; gap:15px; margin-top:25px; justify-content: center; width: 100%;">
                <button class="btn-outline" onclick="closeModal()" style="flex: 1; min-width: 90px;">关闭</button>
                <button class="btn-primary" onclick="copyVideoPath()" style="flex: 1; min-width: 90px; width: auto;">复制路径</button>
                <button id="open-upload-btn" class="btn-outline" style="display:none; flex: 1; min-width: 90px;" onclick="openUploadPage()">去投稿</button>
            </div>
        </div>
    </div>

    <div id="netease-login-modal" class="login-modal" style="display:none;">
        <div class="login-modal-content">
            <h3 style="font-size:20px; font-weight:800; color:var(--accent);">网易云音乐扫码登录</h3>
            <div style="text-align:center; padding:20px 0;">
                <div id="netease-qr-loading" class="status-info" style="margin: 10px 0;">生成二维码中...</div>
                <div class="qr-wrapper" id="netease-qr-wrapper" style="display:none; margin: 15px auto;">
                    <div class="qr-scanner-line"></div>
                    <img id="netease-qr-img" style="max-width:180px; display:block; border: none; border-radius: 0;" alt="网易云登录二维码">
                </div>
            </div>
            <div id="netease-login-msg" class="status-info" style="margin-top:10px; font-size:13px;">请使用网易云音乐App扫码</div>
            <button class="btn-outline" onclick="closeNeteaseLoginModal()" style="margin-top:20px; width: 100%;">取消</button>
        </div>
    </div>
</body>
</html>
