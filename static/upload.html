<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B站投稿 - 网易云每日推荐</title>
    <style>
        :root {
            --bg-color: #0d0d12; --glass-bg: rgba(255,255,255,0.05); --glass-border: rgba(255,255,255,0.1);
            --accent: #00f2fe; --accent-gradient: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --text-main: #ffffff; --text-dim: #a0a0b8;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',system-ui,-apple-system,sans-serif; }
        body { background-color:var(--bg-color); color:var(--text-main); height:100vh; display:grid; grid-template-columns:300px 1fr; overflow:hidden; }
        aside { background:rgba(18,18,24,0.8); border-right:1px solid var(--glass-border); padding:30px; display:flex; flex-direction:column; gap:24px; }
        .logo { font-size:24px; font-weight:800; background:var(--accent-gradient); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:20px; }
        .section-title { font-size:12px; text-transform:uppercase; color:var(--text-dim); letter-spacing:1.5px; margin-bottom:12px; }
        .config-card { background:var(--glass-bg); border:1px solid var(--glass-border); padding:20px; border-radius:12px; }
        input, textarea, select { width:100%; border:none; background:rgba(0,0,0,0.3); color:#fff; padding:12px; border-radius:8px; margin-bottom:15px; outline:none; border:1px solid transparent; transition:all 0.3s; }
        input:focus, textarea:focus, select:focus { border-color:var(--accent); box-shadow:0 0 10px rgba(0,242,254,0.2); }
        textarea { min-height:80px; resize:vertical; }
        button { cursor:pointer; border:none; padding:12px 20px; border-radius:8px; font-weight:600; transition:all 0.3s; }
        .btn-primary { background:var(--accent-gradient); color:#000; width:100%; }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 5px 15px rgba(0,242,254,0.3); }
        .btn-outline { background:transparent; border:1px solid var(--accent); color:var(--accent); }
        .btn-outline:hover { background:rgba(0,242,254,0.1); }
        .btn-danger { background:#ff4757; color:#fff; }
        .btn-danger:hover { background:#ff3742; }
        main { display:flex; flex-direction:column; height:100vh; padding:30px; position:relative; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
        .tab-nav { display:flex; gap:10px; margin-bottom:30px; border-bottom:1px solid var(--glass-border); padding-bottom:10px; }
        .tab-btn { background:transparent; color:var(--text-dim); border:none; padding:10px 20px; border-radius:8px 8px 0 0; cursor:pointer; transition:all 0.3s; }
        .tab-btn.active { background:var(--glass-bg); color:var(--accent); border-bottom:2px solid var(--accent); }
        .tab-content { flex:1; overflow-y:auto; padding-bottom:100px; }
        .upload-section { background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:16px; padding:30px; margin-bottom:30px; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:10px; }
        .form-group { margin-bottom:20px; }
        .form-group label { display:block; margin-bottom:8px; font-size:14px; color:var(--text-dim); }
        .file-input-wrapper { position:relative; display:flex; gap:10px; }
        .file-input-wrapper input[type="text"] { flex:1; margin-bottom:0; }
        .file-input-wrapper .browse-btn { background:var(--glass-bg); border:1px solid var(--glass-border); color:var(--accent); padding:0 20px; border-radius:8px; cursor:pointer; white-space:nowrap; display:flex; align-items:center; }
        .file-input-wrapper .browse-btn:hover { background:rgba(0,242,254,0.1); }
        .file-input-wrapper input[type="file"] { display:none; }
        .drop-zone { border:2px dashed var(--glass-border); border-radius:12px; padding:40px 20px; text-align:center; margin-bottom:20px; cursor:pointer; transition:all 0.3s; }
        .drop-zone:hover, .drop-zone.dragover { border-color:var(--accent); background:rgba(0,242,254,0.05); }
        .drop-zone .icon { font-size:48px; margin-bottom:15px; color:var(--accent); }
        .drop-zone .hint { color:var(--text-dim); font-size:14px; }
        .tag-container { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
        .tag { background:rgba(0,242,254,0.2); color:var(--accent); padding:6px 12px; border-radius:20px; font-size:13px; display:inline-flex; align-items:center; gap:5px; }
        .tag .remove { cursor:pointer; opacity:0.7; }
        .tag .remove:hover { opacity:1; }
        .preview-card { background:rgba(0,0,0,0.3); border:1px solid var(--glass-border); border-radius:12px; padding:20px; margin-top:20px; }
        .preview-card h3 { margin-bottom:10px; color:var(--accent); }
        .status-success { background:rgba(46,204,113,0.2); border:1px solid #2ecc71; color:#2ecc71; padding:15px; border-radius:8px; margin:10px 0; font-size:14px; }
        .status-error { background:rgba(255,71,87,0.2); border:1px solid #ff4757; color:#ff4757; padding:15px; border-radius:8px; margin:10px 0; font-size:14px; }
        .status-info { background:rgba(0,242,254,0.2); border:1px solid var(--accent); color:var(--accent); padding:15px; border-radius:8px; margin:10px 0; font-size:14px; }
        .qr-container { text-align:center; padding:30px; }
        .qr-container img { max-width:200px; margin:20px 0; }
        .format-manager { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:20px; margin-top:20px; }
        .format-card { background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:12px; padding:20px; cursor:pointer; transition:all 0.3s; }
        .format-card:hover { border-color:var(--accent); transform:translateY(-2px); }
        .format-card.selected { border-color:var(--accent); background:rgba(0,242,254,0.1); }
        .format-card h4 { margin-bottom:10px; color:var(--accent); }
        .format-card .tags { display:flex; flex-wrap:wrap; gap:5px; margin-top:10px; }
        .format-card .tag { background:rgba(255,255,255,0.1); color:var(--text-dim); padding:3px 8px; border-radius:12px; font-size:11px; }
        .format-actions { display:flex; gap:10px; margin-top:15px; }
        .format-actions button { flex:1; font-size:12px; padding:8px 12px; }
        .login-modal { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:1000; }
        .login-modal-content { background:var(--bg-color); border:1px solid var(--glass-border); border-radius:20px; padding:40px; text-align:center; max-width:400px; }
    </style>
</head>
<body>
    <aside>
        <div class="logo">网易云每日推荐</div>
        <div>
            <div class="section-title">B站账号</div>
            <div class="config-card">
                <div id="login-status" style="margin-bottom:15px; font-size:14px;">
                    <span style="color:#ff4757;">未登录</span>
                </div>
                <button class="btn-primary" onclick="startBilibiliLogin()">扫码登录</button>
            </div>
        </div>
        <div>
            <div class="section-title">快捷格式</div>
            <div id="sidebar-formats" style="color:var(--text-dim); font-size:13px;">加载中...</div>
        </div>
        <div style="margin-top:auto; padding-top:20px; border-top:1px solid var(--glass-border);">
            <a href="/" style="color:var(--accent); font-size:13px; text-decoration:none;">返回合成页</a>
        </div>
    </aside>
    <main>
        <div class="top-bar">
            <h2>B站视频投稿</h2>
            <div class="tab-nav">
                <button class="tab-btn active" onclick="switchTab('upload')">上传视频</button>
                <button class="tab-btn" onclick="switchTab('formats')">格式管理</button>
            </div>
        </div>
        <div class="tab-content">
            <div id="tab-upload">
                <div class="upload-section">
                    <h3 style="margin-bottom:20px; color:var(--accent);">上传视频文件</h3>

                    <!-- 拖拽上传区域 -->
                    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
                        <div class="icon">&#9654;</div>
                        <div class="hint">拖拽视频文件到此处，或点击选择文件</div>
                        <div id="drop-filename" style="color:var(--accent); margin-top:10px; font-size:14px;"></div>
                    </div>
                    <input type="file" id="file-input" accept="video/*" style="display:none;" onchange="onFileSelected(this)">

                    <div class="form-row">
                        <div class="form-group">
                            <label for="video-path">视频文件路径</label>
                            <div class="file-input-wrapper">
                                <input type="text" id="video-path" placeholder="例如：D:\output\daily_music_20260521.mp4">
                                <label class="browse-btn" for="video-browse">浏览...</label>
                                <input type="file" id="video-browse" accept="video/*" style="display:none;" onchange="onFileSelected(this)">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="cover-path">封面图片路径（可选）</label>
                            <input type="text" id="cover-path" placeholder="留空则使用视频首帧">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="title">视频标题</label>
                        <input type="text" id="title" placeholder="例如：网易云音乐推荐">
                    </div>
                    <div class="form-group">
                        <label for="description">视频简介</label>
                        <textarea id="description" placeholder="可留空，支持歌曲列表自动填充"></textarea>
                    </div>
                    <div class="form-group">
                        <label>标签</label>
                        <div class="tag-container" id="tag-container">
                            <span class="tag">音乐 <span class="remove" onclick="removeTag(this,'音乐')">x</span></span>
                            <span class="tag">网易云音乐 <span class="remove" onclick="removeTag(this,'网易云音乐')">x</span></span>
                        </div>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="tag-input" placeholder="输入标签后按回车添加" style="flex:1; margin-bottom:0;">
                            <button class="btn-outline" onclick="addTag()">添加</button>
                        </div>
                    </div>
                    <button class="btn-primary" onclick="startUpload()">开始上传</button>
                    <div id="upload-result"></div>
                </div>
            </div>
            <div id="tab-formats" style="display:none;">
                <div class="upload-section">
                    <h3 style="margin-bottom:20px;">格式编辑</h3>
                    <div class="form-group">
                        <label for="format-name">格式名称</label>
                        <input type="text" id="format-name" placeholder="例如：默认格式">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="format-title">标题模板</label>
                            <input type="text" id="format-title" placeholder="例如：每日网易云音乐推荐">
                        </div>
                        <div class="form-group">
                            <label for="format-cover">封面策略</label>
                            <select id="format-cover" onchange="toggleCustomCover()">
                                <option value="first_song">使用第一首歌曲封面</option>
                                <option value="custom">自定义图片</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group" id="custom-cover-group" style="display:none;">
                        <label for="format-cover-custom">自定义封面路径</label>
                        <input type="text" id="format-cover-custom" placeholder="例如：D:\cover.png">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="format-description">简介策略</label>
                            <select id="format-description" onchange="toggleCustomDesc()">
                                <option value="song_list">使用歌曲列表</option>
                                <option value="custom">自定义简介</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group" id="custom-desc-group" style="display:none;">
                        <label for="format-description-custom">自定义简介</label>
                        <textarea id="format-description-custom" placeholder="输入自定义简介内容"></textarea>
                    </div>
                    <div class="form-group">
                        <label>标签</label>
                        <div class="tag-container" id="format-tag-container">
                            <span class="tag">音乐 <span class="remove" onclick="removeFormatTag(this,'音乐')">x</span></span>
                            <span class="tag">网易云音乐 <span class="remove" onclick="removeFormatTag(this,'网易云音乐')">x</span></span>
                        </div>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="format-tag-input" placeholder="输入标签后按回车添加" style="flex:1; margin-bottom:0;">
                            <button class="btn-outline" onclick="addFormatTag()">添加</button>
                        </div>
                    </div>
                    <div style="display:flex; gap:10px; margin-top:20px;">
                        <button class="btn-primary" onclick="saveFormat()" style="flex:1;">保存格式</button>
                        <button class="btn-outline" onclick="resetFormatForm()" style="flex:1;">重置</button>
                    </div>
                    <div class="format-manager" id="format-manager"></div>
                </div>
            </div>
        </div>
    </div>
    <div id="login-modal" class="login-modal" style="display:none;">
        <div class="login-modal-content">
            <h3>B站扫码登录</h3>
            <div class="qr-container">
                <div id="qr-loading">生成二维码中...</div>
                <img id="qr-img" style="display:none;" alt="B站登录二维码">
            </div>
            <div id="login-msg" style="margin-top:15px; font-size:14px; color:var(--text-dim);">请使用B站App扫码</div>
            <button class="btn-outline" onclick="closeLoginModal()" style="margin-top:20px;">取消</button>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let tags = ['音乐', '网易云音乐'];
        let formatTags = ['音乐', '网易云音乐'];
        let currentFormats = [];
        let loginPolling = null;

        /* ========== 拖拽 & 文件选择 ========== */
        const dropZone = document.getElementById('drop-zone');
        const dropFilename = document.getElementById('drop-filename');

        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if(file) handleVideoFile(file);
        });
        window.onFileSelected = function(input) {
            const file = input.files[0];
            if(file) handleVideoFile(file);
        };

        async function handleVideoFile(file) {
            dropFilename.textContent = '正在上传: ' + file.name + '...';
            const formData = new FormData();
            formData.append('file', file);
            try {
                const res = await fetch(API_BASE+'/bilibili/upload-file', { method:'POST', body: formData });
                const data = await res.json();
                if(data.path) {
                    document.getElementById('video-path').value = data.path;
                    dropFilename.textContent = file.name + ' (已就绪)';
                } else {
                    dropFilename.textContent = '上传失败: ' + (data.error || '未知错误');
                }
            } catch(e) {
                dropFilename.textContent = '上传失败: ' + e.message;
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => { if(b.textContent.includes(tab==='upload'?'上传':'格式')) b.classList.add('active'); });
            document.getElementById('tab-upload').style.display = tab==='upload'?'block':'none';
            document.getElementById('tab-formats').style.display = tab==='formats'?'block':'none';
            if(tab==='formats') loadFormats();
        }

        function renderTags(container, tagList, removeFn) {
            container.innerHTML = tagList.map(t => 
                '<span class="tag">' + t + ' <span class="remove" onclick="' + removeFn + '(this,\'' + t + '\')">x</span></span>'
            ).join('');
        }

        function addTag() {
            const input = document.getElementById('tag-input');
            const val = input.value.trim();
            if(val && !tags.includes(val)) { tags.push(val); renderTags(document.getElementById('tag-container'), tags, 'removeTag'); }
            input.value = '';
        }

        function removeTag(el, name) {
            tags = tags.filter(t => t!==name);
            renderTags(document.getElementById('tag-container'), tags, 'removeTag');
        }

        document.getElementById('tag-input').addEventListener('keydown', function(e) { if(e.key==='Enter') { e.preventDefault(); addTag(); } });

        function addFormatTag() {
            const input = document.getElementById('format-tag-input');
            const val = input.value.trim();
            if(val && !formatTags.includes(val)) { formatTags.push(val); renderTags(document.getElementById('format-tag-container'), formatTags, 'removeFormatTag'); }
            input.value = '';
        }

        function removeFormatTag(el, name) {
            formatTags = formatTags.filter(t => t!==name);
            renderTags(document.getElementById('format-tag-container'), formatTags, 'removeFormatTag');
        }

        document.getElementById('format-tag-input').addEventListener('keydown', function(e) { if(e.key==='Enter') { e.preventDefault(); addFormatTag(); } });

        function toggleCustomCover() {
            document.getElementById('custom-cover-group').style.display = document.getElementById('format-cover').value==='custom'?'block':'none';
        }

        function toggleCustomDesc() {
            document.getElementById('custom-desc-group').style.display = document.getElementById('format-description').value==='custom'?'block':'none';
        }

        async function startBilibiliLogin() {
            document.getElementById('login-modal').style.display = 'flex';
            document.getElementById('qr-img').style.display = 'none';
            document.getElementById('qr-loading').style.display = 'block';
            document.getElementById('login-msg').innerText = '请使用B站App扫码';
            try {
                const res = await fetch(API_BASE+'/bilibili/qrcode');
                const data = await res.json();
                if(data.qr_path) {
                    document.getElementById('qr-img').src = '/static/'+data.qr_path.split(/[\\/]/).pop();
                    document.getElementById('qr-img').style.display = 'block';
                    document.getElementById('qr-loading').style.display = 'none';
                    pollLogin(data.raw_json);
                } else {
                    document.getElementById('login-msg').innerText = '获取二维码失败: '+(data.error||'未知错误');
                }
            } catch(e) {
                document.getElementById('login-msg').innerText = '连接失败: '+e.message;
            }
        }

        let isChecking = false;
        async function pollLogin(rawJson) {
            if(loginPolling) clearInterval(loginPolling);
            isChecking = false;
            loginPolling = setInterval(async () => {
                if (isChecking) return;
                isChecking = true;
                try {
                    const res = await fetch(API_BASE+'/bilibili/check-login', {
                        method:'POST', headers:{'Content-Type':'application/json'},
                        body: JSON.stringify(rawJson)
                    });
                    const data = await res.json();
                    if(data.success) {
                        clearInterval(loginPolling);
                        document.getElementById('login-status').innerHTML = '<span style="color:#2ecc71;">已登录</span>';
                        document.getElementById('login-msg').innerText = '登录成功！';
                        setTimeout(() => closeLoginModal(), 1500);
                    }
                } catch(e) {
                } finally {
                    isChecking = false;
                }
            }, 2000);
        }

        function closeLoginModal() {
            document.getElementById('login-modal').style.display = 'none';
            if(loginPolling) clearInterval(loginPolling);
        }

        async function startUpload() {
            const resultDiv = document.getElementById('upload-result');
            const videoPath = document.getElementById('video-path').value.trim();
            if(!videoPath) { resultDiv.innerHTML = '<div class="status-error">请输入视频文件路径</div>'; return; }
            resultDiv.innerHTML = '<div class="status-info">正在上传...</div>';
            try {
                const res = await fetch(API_BASE+'/bilibili/upload', {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({
                        video_path: videoPath,
                        title: document.getElementById('title').value,
                        description: document.getElementById('description').value,
                        tags: tags,
                        cover: document.getElementById('cover-path').value
                    })
                });
                const data = await res.json();
                if(data.success || data.bvid) {
                    resultDiv.innerHTML = '<div class="status-success">上传成功！BV号: '+(data.bvid||'查看控制台')+'</div>';
                } else {
                    resultDiv.innerHTML = '<div class="status-error">上传失败: '+(data.error||JSON.stringify(data))+'</div>';
                }
            } catch(e) {
                resultDiv.innerHTML = '<div class="status-error">请求失败: '+e.message+'</div>';
            }
        }

        async function loadFormats() {
            try {
                const res = await fetch(API_BASE+'/bilibili/upload-formats');
                currentFormats = await res.json();
                renderFormatCards();
                renderSidebarFormats();
            } catch(e) {}
        }

        function renderFormatCards() {
            const container = document.getElementById('format-manager');
            container.innerHTML = currentFormats.map((f,i) => 
                '<div class="format-card" onclick="editFormat('+i+')">' +
                '<h4>'+f.name+'</h4>' +
                '<div style="font-size:13px;">标题: '+f.title+'</div>' +
                '<div style="font-size:13px;">封面: '+(f.cover==='first_song'?'第一首':'自定义')+'</div>' +
                '<div class="tags">'+f.tags.map(t=>'<span class="tag">'+t+'</span>').join('')+'</div>' +
                '<div class="format-actions">' +
                '<button class="btn-danger" onclick="event.stopPropagation(); deleteFormat(\''+f.name+'\')">删除</button>' +
                '</div></div>'
            ).join('');
        }

        function renderSidebarFormats() {
            document.getElementById('sidebar-formats').innerHTML = currentFormats.map(f => 
                '<div style="padding:8px 0; font-size:13px; cursor:pointer; color:var(--accent);" onclick="applyFormat(\''+f.name+'\')">'+f.name+'</div>'
            ).join('') || '暂无格式';
        }

        function applyFormat(formatName) {
            const format = currentFormats.find(f => f.name === formatName);
            if(!format) return;
            
            document.getElementById('title').value = format.title;
            document.getElementById('cover-path').value = format.cover_custom || '';
            
            if(format.description === 'song_list') {
                document.getElementById('description').value = '';
            } else if(format.description === 'custom') {
                document.getElementById('description').value = format.description_custom || '';
            }
            
            tags = [...format.tags];
            renderTags(document.getElementById('tag-container'), tags, 'removeTag');
        }

        function editFormat(idx) {
            const f = currentFormats[idx];
            document.getElementById('format-name').value = f.name;
            document.getElementById('format-title').value = f.title;
            document.getElementById('format-cover').value = f.cover;
            document.getElementById('format-cover-custom').value = f.cover_custom || '';
            document.getElementById('format-description').value = f.description;
            document.getElementById('format-description-custom').value = f.description_custom || '';
            formatTags = [...f.tags];
            renderTags(document.getElementById('format-tag-container'), formatTags, 'removeFormatTag');
            toggleCustomCover();
            toggleCustomDesc();
        }

        async function saveFormat() {
            const data = {
                name: document.getElementById('format-name').value,
                title: document.getElementById('format-title').value,
                cover: document.getElementById('format-cover').value,
                cover_custom: document.getElementById('format-cover-custom').value,
                description: document.getElementById('format-description').value,
                description_custom: document.getElementById('format-description-custom').value,
                tags: formatTags
            };
            try {
                await fetch(API_BASE+'/bilibili/upload-formats', {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify(data)
                });
                await loadFormats();
            } catch(e) {}
        }

        async function deleteFormat(name) {
            if(!confirm('确认删除格式 "'+name+'"?')) return;
            try {
                await fetch(API_BASE+'/bilibili/upload-formats/'+encodeURIComponent(name), { method:'DELETE' });
                await loadFormats();
            } catch(e) {}
        }

        function resetFormatForm() {
            document.getElementById('format-name').value = '';
            document.getElementById('format-title').value = '';
            document.getElementById('format-cover').value = 'first_song';
            document.getElementById('format-cover-custom').value = '';
            document.getElementById('format-description').value = 'song_list';
            document.getElementById('format-description-custom').value = '';
            formatTags = ['音乐', '网易云音乐'];
            renderTags(document.getElementById('format-tag-container'), formatTags, 'removeFormatTag');
            toggleCustomCover();
            toggleCustomDesc();
        }

        // 页面加载时检查登录状态
        async function checkLoginStatus() {
            try {
                const res = await fetch(API_BASE+'/bilibili/check-cookie');
                const data = await res.json();
                if(data.logged_in) {
                    document.getElementById('login-status').innerHTML = '<span style="color:#2ecc71;">已登录</span>';
                }
            } catch(e) {
                // 忽略错误，保持未登录状态
            }
        }

        // 初始化
        loadFormats();
        checkLoginStatus();
    </script>
</body>
</html>
