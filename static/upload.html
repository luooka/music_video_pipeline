<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B站投稿 - 网易云每日推荐</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg-color: #08080c;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.07);
            --accent: #00f2fe;
            --accent-gradient: linear-gradient(135deg, #00f2fe 0%, #4facfe 50%, #9b51e0 100%);
            --text-main: #f5f5f7;
            --text-dim: #8e8e9f;
            --success: hsl(142, 70%, 45%);
            --error: hsl(350, 80%, 60%);
            --info: hsl(195, 90%, 55%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, -apple-system, sans-serif !important;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: grid;
            grid-template-columns: 300px 1fr;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans' !important;
        }

        /* Frosted custom scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Scanner Laser line overlay */
        .qr-wrapper {
            position: relative;
            display: inline-block;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .qr-scanner-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, transparent, #00f2fe, #2ecc71, #00f2fe, transparent);
            box-shadow: 0 0 8px #00f2fe, 0 0 15px #2ecc71;
            animation: scanLine 2.5s ease-in-out infinite;
            z-index: 5;
        }

        @keyframes scanLine {
            0% {
                top: 0%;
            }

            50% {
                top: 100%;
            }

            100% {
                top: 0%;
            }
        }

        aside {
            background: rgba(18, 18, 24, 0.8);
            border-right: 1px solid var(--glass-border);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1.5px;
            margin-bottom: 12px;
        }

        .config-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 12px;
        }

        input,
        textarea,
        select {
            width: 100%;
            border: none;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            outline: none;
            border: 1px solid transparent;
            transition: all 0.3s;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        button {
            cursor: pointer;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: #000;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .btn-outline:hover {
            background: rgba(0, 242, 254, 0.1);
        }

        .btn-danger {
            background: #ff4757;
            color: #fff;
        }

        .btn-danger:hover {
            background: #ff3742;
        }

        main {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 30px;
            position: relative;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .tab-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
        }

        .tab-btn {
            background: transparent;
            color: var(--text-dim);
            border: none;
            padding: 10px 20px;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--glass-bg);
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 100px;
        }

        .upload-section {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-dim);
        }

        .file-input-wrapper {
            position: relative;
            display: flex;
            gap: 10px;
        }

        .file-input-wrapper input[type="text"] {
            flex: 1;
            margin-bottom: 0;
        }

        .file-input-wrapper .browse-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--accent);
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
            display: flex;
            align-items: center;
        }

        .file-input-wrapper .browse-btn:hover {
            background: rgba(0, 242, 254, 0.1);
        }

        .file-input-wrapper input[type="file"] {
            display: none;
        }

        .drop-zone {
            border: 2px dashed var(--glass-border);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: var(--accent);
            background: rgba(0, 242, 254, 0.05);
        }

        .drop-zone .icon {
            font-size: 48px;
            margin-bottom: 15px;
            color: var(--accent);
        }

        .drop-zone .hint {
            color: var(--text-dim);
            font-size: 14px;
        }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }

        .tag {
            background: rgba(0, 242, 254, 0.2);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .tag .remove {
            cursor: pointer;
            opacity: 0.7;
        }

        .tag .remove:hover {
            opacity: 1;
        }

        .preview-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }

        .preview-card h3 {
            margin-bottom: 10px;
            color: var(--accent);
        }

        .status-success {
            background: rgba(46, 204, 113, 0.1) !important;
            border: 1px solid var(--success) !important;
            color: var(--success) !important;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 14px;
        }

        .status-error {
            background: rgba(255, 71, 87, 0.1) !important;
            border: 1px solid var(--error) !important;
            color: var(--error) !important;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 14px;
        }

        .status-info {
            background: rgba(0, 242, 254, 0.1) !important;
            border: 1px solid var(--info) !important;
            color: var(--info) !important;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 14px;
        }

        .qr-container {
            text-align: center;
            padding: 15px;
        }

        .qr-container img {
            max-width: 200px;
            margin: 20px 0;
        }

        .format-manager {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .format-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .format-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .format-card.selected {
            border-color: var(--accent);
            background: rgba(0, 242, 254, 0.1);
        }

        .format-card h4 {
            margin-bottom: 10px;
            color: var(--accent);
        }

        .format-card .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
        }

        .format-card .tag {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-dim);
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
        }

        .format-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .format-actions button {
            flex: 1;
            font-size: 12px;
            padding: 8px 12px;
        }

        .login-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-modal-content {
            background: var(--bg-color);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
        }

        .top-bar a {
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1) !important;
        }

        .top-bar a:hover {
            color: var(--accent) !important;
            background: rgba(0, 242, 254, 0.08) !important;
            box-shadow: 0 4px 12px rgba(0, 242, 254, 0.1);
        }
    </style>
</head>

<body>
    <aside>
        <div class="logo">网易云每日推荐</div>
        <div>
            <div class="section-title">B站账号</div>
            <div class="config-card">
                <div id="login-status" style="margin-bottom:15px; font-size:14px;">
                    <span style="color:#ff4757;">未登录</span>
                </div>
                <button class="btn-primary" onclick="startBilibiliLogin()">扫码登录</button>
            </div>
        </div>
        <div>
            <div class="section-title">快捷格式</div>
            <div id="sidebar-formats" style="color:var(--text-dim); font-size:13px;">加载中...</div>
        </div>
    </aside>
    <main>
        <div class="top-bar">
            <div style="display:flex; align-items:center; gap:30px; flex:1;">
                <h2>B站视频投稿</h2>
                <div style="display:flex; gap:15px; align-items:center;">
                    <a href="/"
                        style="color:var(--text-dim); text-decoration:none; font-size:14px; padding:8px 12px; border-radius:6px; transition: all 0.3s;">合成页</a>
                    <a href="/static/logs.html"
                        style="color:var(--text-dim); text-decoration:none; font-size:14px; padding:8px 12px; border-radius:6px; transition: all 0.3s;">监控页</a>
                    <a href="/static/upload.html"
                        style="color:var(--accent); text-decoration:none; font-size:14px; padding:8px 12px; border-radius:6px; background:rgba(0,242,254,0.1); transition: all 0.3s;">投稿页</a>
                </div>
            </div>
            <div class="tab-nav" style="margin-bottom:0; border-bottom:none; padding-bottom:0;">
                <button class="tab-btn active" onclick="switchTab('upload')">上传视频</button>
                <button class="tab-btn" onclick="switchTab('formats')">格式管理</button>
            </div>
        </div>
        <div class="tab-content">
            <div id="tab-upload">
                <div class="upload-section">
                    <h3 style="margin-bottom:20px; color:var(--accent);">上传视频文件</h3>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="video-path">视频文件路径</label>
                            <div class="file-input-wrapper">
                                <input type="text" id="video-path" placeholder="例如：D:\output\daily_music_20260521.mp4">
                                <label class="browse-btn" for="video-browse">浏览...</label>
                                <input type="file" id="video-browse" accept="video/*" style="display:none;"
                                    onchange="onFileSelected(this)">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="cover-path">封面图片路径（可选）</label>
                            <div class="file-input-wrapper">
                                <input type="text" id="cover-path" placeholder="留空则使用视频首帧">
                                <label class="browse-btn" for="cover-browse">浏览...</label>
                                <input type="file" id="cover-browse" accept="image/*" style="display:none;"
                                    onchange="onCoverSelected(this)">
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="title">视频标题</label>
                        <input type="text" id="title" placeholder="例如：网易云音乐推荐">
                    </div>
                    <div class="form-group">
                        <label for="description">视频简介</label>
                        <textarea id="description" placeholder="可留空，支持歌曲列表自动填充"></textarea>
                    </div>
                    <div class="form-group">
                        <label>标签</label>
                        <div class="tag-container" id="tag-container">
                            <span class="tag">音乐 <span class="remove" onclick="removeTag(this,'音乐')">x</span></span>
                            <span class="tag">网易云音乐 <span class="remove"
                                    onclick="removeTag(this,'网易云音乐')">x</span></span>
                        </div>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="tag-input" placeholder="输入标签后按回车添加" style="flex:1; margin-bottom:0;">
                            <button class="btn-outline" onclick="addTag()">添加</button>
                        </div>
                    </div>
                    <button class="btn-primary" onclick="startUpload()">开始上传</button>
                    <div id="upload-result"></div>
                </div>
            </div>
            <div id="tab-formats" style="display:none;">
                <div class="upload-section">
                    <h3 style="margin-bottom:20px;">格式编辑</h3>
                    <div class="form-group">
                        <label for="format-name">格式名称</label>
                        <input type="text" id="format-name" placeholder="例如：默认格式">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="format-title">标题模板</label>
                            <input type="text" id="format-title" placeholder="例如：每日网易云音乐推荐">
                        </div>
                        <div class="form-group">
                            <label for="format-cover">封面策略</label>
                            <select id="format-cover" onchange="toggleCustomCover()">
                                <option value="first_song">使用第一首歌曲封面</option>
                                <option value="custom">自定义图片</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group" id="custom-cover-group" style="display:none;">
                        <label for="format-cover-custom">自定义封面路径</label>
                        <input type="text" id="format-cover-custom" placeholder="例如：D:\cover.png">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="format-description">简介策略</label>
                            <select id="format-description" onchange="toggleCustomDesc()">
                                <option value="song_list">使用歌曲列表</option>
                                <option value="custom">自定义简介</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group" id="custom-desc-group" style="display:none;">
                        <label for="format-description-custom">自定义简介</label>
                        <textarea id="format-description-custom" placeholder="输入自定义简介内容"></textarea>
                    </div>
                    <div class="form-group">
                        <label>标签</label>
                        <div class="tag-container" id="format-tag-container">
                            <span class="tag">音乐 <span class="remove"
                                    onclick="removeFormatTag(this,'音乐')">x</span></span>
                            <span class="tag">网易云音乐 <span class="remove"
                                    onclick="removeFormatTag(this,'网易云音乐')">x</span></span>
                        </div>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="format-tag-input" placeholder="输入标签后按回车添加"
                                style="flex:1; margin-bottom:0;">
                            <button class="btn-outline" onclick="addFormatTag()">添加</button>
                        </div>
                    </div>
                    <div style="display:flex; gap:10px; margin-top:20px;">
                        <button class="btn-primary" onclick="saveFormat()" style="flex:1;">保存格式</button>
                        <button class="btn-outline" onclick="resetFormatForm()" style="flex:1;">重置</button>
                    </div>
                    <div class="format-manager" id="format-manager"></div>
                </div>
            </div>
        </div>
        </div>
        <div id="login-modal" class="login-modal" style="display:none;">
            <div class="login-modal-content">
                <h3 style="font-size:20px; font-weight:800; color:var(--accent);">B站扫码登录</h3>
                <div style="text-align:center; padding:15px 0;">
                    <div id="qr-loading" class="status-info" style="margin: 10px 0;">生成二维码中...</div>
                    <div class="qr-wrapper" id="qr-wrapper" style="display:none; margin: 15px auto;">
                        <div class="qr-scanner-line"></div>
                        <img id="qr-img" style="max-width:180px; display:block; border: none; border-radius: 0;"
                            alt="B站登录二维码">
                    </div>
                </div>
                <div id="login-msg" class="status-info" style="margin-top:10px; font-size:13px;">请使用B站App扫码</div>
                <button class="btn-outline" onclick="closeLoginModal()"
                    style="margin-top:20px; width: 100%;">取消</button>
            </div>
        </div>

        <script>
            const API_BASE = window.location.origin;
            let tags = ['音乐', '网易云音乐'];
            let formatTags = ['音乐', '网易云音乐'];
            let currentFormats = [];
            let loginPolling = null;

            /* ========== 文件选择与上传 ========== */
            window.onFileSelected = function (input) {
                const file = input.files[0];
                if (file) handleVideoFile(file);
            };

            async function handleVideoFile(file) {
                const videoPathInput = document.getElementById('video-path');
                videoPathInput.value = '正在上传视频中...';
                videoPathInput.disabled = true;

                const formData = new FormData();
                formData.append('file', file);
                try {
                    const res = await fetch(API_BASE + '/bilibili/upload-file', { method: 'POST', body: formData });
                    const data = await res.json();
                    if (data.path) {
                        videoPathInput.value = data.path;
                    } else {
                        alert('上传视频失败: ' + (data.error || '未知错误'));
                        videoPathInput.value = '';
                    }
                } catch (e) {
                    alert('上传视频失败: ' + e.message);
                    videoPathInput.value = '';
                } finally {
                    videoPathInput.disabled = false;
                }
            }

            window.onCoverSelected = async function (input) {
                const file = input.files[0];
                if (file) {
                    const coverPathInput = document.getElementById('cover-path');
                    coverPathInput.value = '正在上传封面中...';
                    coverPathInput.disabled = true;

                    const formData = new FormData();
                    formData.append('file', file);
                    try {
                        const res = await fetch(API_BASE + '/bilibili/upload-file', { method: 'POST', body: formData });
                        const data = await res.json();
                        if (data.path) {
                            coverPathInput.value = data.path;
                        } else {
                            alert('上传封面失败: ' + (data.error || '未知错误'));
                            coverPathInput.value = '';
                        }
                    } catch (e) {
                        alert('上传封面失败: ' + e.message);
                        coverPathInput.value = '';
                    } finally {
                        coverPathInput.disabled = false;
                    }
                }
            };

            function switchTab(tab) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-btn').forEach(b => { if (b.textContent.includes(tab === 'upload' ? '上传' : '格式')) b.classList.add('active'); });
                document.getElementById('tab-upload').style.display = tab === 'upload' ? 'block' : 'none';
                document.getElementById('tab-formats').style.display = tab === 'formats' ? 'block' : 'none';
                if (tab === 'formats') loadFormats();
            }

            function renderTags(container, tagList, removeFn) {
                container.innerHTML = tagList.map(t =>
                    '<span class="tag">' + t + ' <span class="remove" onclick="' + removeFn + '(this,\'' + t + '\')">x</span></span>'
                ).join('');
            }

            function addTag() {
                const input = document.getElementById('tag-input');
                const val = input.value.trim();
                if (val && !tags.includes(val)) { tags.push(val); renderTags(document.getElementById('tag-container'), tags, 'removeTag'); }
                input.value = '';
            }

            function removeTag(el, name) {
                tags = tags.filter(t => t !== name);
                renderTags(document.getElementById('tag-container'), tags, 'removeTag');
            }

            document.getElementById('tag-input').addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.preventDefault(); addTag(); } });

            function addFormatTag() {
                const input = document.getElementById('format-tag-input');
                const val = input.value.trim();
                if (val && !formatTags.includes(val)) { formatTags.push(val); renderTags(document.getElementById('format-tag-container'), formatTags, 'removeFormatTag'); }
                input.value = '';
            }

            function removeFormatTag(el, name) {
                formatTags = formatTags.filter(t => t !== name);
                renderTags(document.getElementById('format-tag-container'), formatTags, 'removeFormatTag');
            }

            document.getElementById('format-tag-input').addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.preventDefault(); addFormatTag(); } });

            function toggleCustomCover() {
                document.getElementById('custom-cover-group').style.display = document.getElementById('format-cover').value === 'custom' ? 'block' : 'none';
            }

            function toggleCustomDesc() {
                document.getElementById('custom-desc-group').style.display = document.getElementById('format-description').value === 'custom' ? 'block' : 'none';
            }

            async function startBilibiliLogin() {
                document.getElementById('login-modal').style.display = 'flex';
                document.getElementById('qr-wrapper').style.display = 'none';
                document.getElementById('qr-loading').style.display = 'block';
                document.getElementById('login-msg').innerText = '请使用B站App扫码';
                document.getElementById('login-msg').className = 'status-info';
                try {
                    const res = await fetch(API_BASE + '/bilibili/qrcode');
                    const data = await res.json();
                    if (data.qr_path) {
                        document.getElementById('qr-img').src = '/static/' + data.qr_path.split(/[\\/]/).pop();
                        document.getElementById('qr-wrapper').style.display = 'inline-block';
                        document.getElementById('qr-loading').style.display = 'none';
                        pollLogin(data.raw_json);
                    } else {
                        document.getElementById('login-msg').innerText = '获取二维码失败: ' + (data.error || '未知错误');
                    }
                } catch (e) {
                    document.getElementById('login-msg').innerText = '连接失败: ' + e.message;
                }
            }

            let isChecking = false;
            async function pollLogin(rawJson) {
                if (loginPolling) clearInterval(loginPolling);
                isChecking = false;
                loginPolling = setInterval(async () => {
                    if (isChecking) return;
                    isChecking = true;
                    try {
                        const res = await fetch(API_BASE + '/bilibili/check-login', {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(rawJson)
                        });
                        const data = await res.json();
                        if (data.success) {
                            clearInterval(loginPolling);
                            document.getElementById('login-status').innerHTML = '<span style="color:#2ecc71;">已登录</span>';
                            document.getElementById('login-msg').innerText = '登录成功！';
                            setTimeout(() => closeLoginModal(), 1500);
                        }
                    } catch (e) {
                    } finally {
                        isChecking = false;
                    }
                }, 2000);
            }

            function closeLoginModal() {
                document.getElementById('login-modal').style.display = 'none';
                if (loginPolling) clearInterval(loginPolling);
            }

            async function startUpload() {
                const resultDiv = document.getElementById('upload-result');
                const videoPath = document.getElementById('video-path').value.trim();
                if (!videoPath) { resultDiv.innerHTML = '<div class="status-error">请输入视频文件路径</div>'; return; }
                resultDiv.innerHTML = '<div class="status-info">正在上传...</div>';
                try {
                    const res = await fetch(API_BASE + '/bilibili/upload', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            video_path: videoPath,
                            title: document.getElementById('title').value,
                            description: document.getElementById('description').value,
                            tags: tags,
                            cover: document.getElementById('cover-path').value
                        })
                    });
                    const data = await res.json();
                    if (data.success || data.bvid) {
                        resultDiv.innerHTML = '<div class="status-success">上传成功！</div>';
                    } else {
                        resultDiv.innerHTML = '<div class="status-error">上传失败: ' + (data.error || JSON.stringify(data)) + '</div>';
                    }
                } catch (e) {
                    resultDiv.innerHTML = '<div class="status-error">请求失败: ' + e.message + '</div>';
                }
            }

            async function loadFormats() {
                try {
                    const res = await fetch(API_BASE + '/bilibili/upload-formats');
                    currentFormats = await res.json();
                    renderFormatCards();
                    renderSidebarFormats();
                } catch (e) { }
            }

            function renderFormatCards() {
                const container = document.getElementById('format-manager');
                container.innerHTML = currentFormats.map((f, i) =>
                    '<div class="format-card" onclick="editFormat(' + i + ')">' +
                    '<h4>' + f.name + '</h4>' +
                    '<div style="font-size:13px;">标题: ' + f.title + '</div>' +
                    '<div style="font-size:13px;">封面: ' + (f.cover === 'first_song' ? '第一首' : '自定义') + '</div>' +
                    '<div class="tags">' + f.tags.map(t => '<span class="tag">' + t + '</span>').join('') + '</div>' +
                    '<div class="format-actions">' +
                    '<button class="btn-danger" onclick="event.stopPropagation(); deleteFormat(\'' + f.name + '\')">删除</button>' +
                    '</div></div>'
                ).join('');
            }

            function renderSidebarFormats() {
                document.getElementById('sidebar-formats').innerHTML = currentFormats.map(f =>
                    '<div style="padding:8px 0; font-size:13px; cursor:pointer; color:var(--accent);" onclick="applyFormat(\'' + f.name + '\')">' + f.name + '</div>'
                ).join('') || '暂无格式';
            }

            function applyFormat(formatName) {
                const format = currentFormats.find(f => f.name === formatName);
                if (!format) return;

                document.getElementById('title').value = format.title;
                document.getElementById('cover-path').value = format.cover_custom || '';

                if (format.description === 'song_list') {
                    document.getElementById('description').value = '';
                } else if (format.description === 'custom') {
                    document.getElementById('description').value = format.description_custom || '';
                }

                tags = [...format.tags];
                renderTags(document.getElementById('tag-container'), tags, 'removeTag');
            }

            function editFormat(idx) {
                const f = currentFormats[idx];
                document.getElementById('format-name').value = f.name;
                document.getElementById('format-title').value = f.title;
                document.getElementById('format-cover').value = f.cover;
                document.getElementById('format-cover-custom').value = f.cover_custom || '';
                document.getElementById('format-description').value = f.description;
                document.getElementById('format-description-custom').value = f.description_custom || '';
                formatTags = [...f.tags];
                renderTags(document.getElementById('format-tag-container'), formatTags, 'removeFormatTag');
                toggleCustomCover();
                toggleCustomDesc();
            }

            async function saveFormat() {
                const data = {
                    name: document.getElementById('format-name').value,
                    title: document.getElementById('format-title').value,
                    cover: document.getElementById('format-cover').value,
                    cover_custom: document.getElementById('format-cover-custom').value,
                    description: document.getElementById('format-description').value,
                    description_custom: document.getElementById('format-description-custom').value,
                    tags: formatTags
                };
                try {
                    await fetch(API_BASE + '/bilibili/upload-formats', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    await loadFormats();
                } catch (e) { }
            }

            async function deleteFormat(name) {
                if (!confirm('确认删除格式 "' + name + '"?')) return;
                try {
                    await fetch(API_BASE + '/bilibili/upload-formats/' + encodeURIComponent(name), { method: 'DELETE' });
                    await loadFormats();
                } catch (e) { }
            }

            function resetFormatForm() {
                document.getElementById('format-name').value = '';
                document.getElementById('format-title').value = '';
                document.getElementById('format-cover').value = 'first_song';
                document.getElementById('format-cover-custom').value = '';
                document.getElementById('format-description').value = 'song_list';
                document.getElementById('format-description-custom').value = '';
                formatTags = ['音乐', '网易云音乐'];
                renderTags(document.getElementById('format-tag-container'), formatTags, 'removeFormatTag');
                toggleCustomCover();
                toggleCustomDesc();
            }

            // 页面加载时检查登录状态
            async function checkLoginStatus() {
                try {
                    const res = await fetch(API_BASE + '/bilibili/check-cookie');
                    const data = await res.json();
                    if (data.logged_in) {
                        document.getElementById('login-status').innerHTML = '<span style="color:#2ecc71;">已登录</span>';
                    }
                } catch (e) {
                    // 忽略错误，保持未登录状态
                }
            }

            // 初始化
            loadFormats();
            checkLoginStatus();

            // 解析并自动填充 url 中传递过来的视频路径参数
            const urlParams = new URLSearchParams(window.location.search);
            const videoPath = urlParams.get('video_path');
            if (videoPath) {
                document.getElementById('video-path').value = decodeURIComponent(videoPath);
            }
        </script>
</body>

</html>
